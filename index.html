       f2:"독일은 2023년부터 정밀 장거리 타격 능력 확보를 미국에 요청해왔지만 번번이 성사되지 못했다. 러시아가 칼리닌그라드에 이스칸데르 미사일과 극초음속 미사일 탑재 전투기를 배치하며 위협 수위를 높여온 데 대응한 조치로, 이번 계약은 미사일과 지상 발사대(타이푼)를 독일이 직접 소유·운용하는 방식이다.",
       f3:"유럽이 미국 무기체계에 대한 의존을 유지하면서도 자체 억지력 공백을 메우려는 이중 전략을 보여준다. 국방·안보 클라이언트를 다루는 컨설턴트라면, 유럽 재무장이 만들어내는 방위산업 공급망 재편 수요를 눈여겨봐야 한다.",
       terms:[]}
    ]},
    {id:"econ",no:"02",title:"글로벌 경제·시장",slug:"Economy",items:[
      {tag:"통화정책",title:"美 6월 CPI 3.5%로 둔화…7월 금리 인상 가능성 10%로 급락",
       source:{name:"CNBC",url:"https://www.cnbc.com/2026/07/14/consumer-price-index-inflation-report-june-2026.html",date:"2026.07.14"},
       f1:"미국 6월 소비자물가지수(CPI)가 전월 대비 0.4% 하락하며 연율 기준 3.5%로 둔화됐다. 다우존스 집계 전망치(3.8%)를 크게 밑돈 수치로, 월간 하락폭은 2020년 4월 이후 최대였다. 근원물가는 전월 대비 보합, 전년 대비 2.6%를 기록했다.",
       f2:"5월 CPI 급등은 이스라엘-이란 전쟁에 따른 유가 급등이 주된 원인이었다. 6월 들어 에너지 지수가 5.7% 급락하며 물가 상승 압력이 완화됐지만, 휘발유 가격은 여전히 전년 대비 26.7% 높은 수준이다. 이번 지표는 지난달 취임한 케빈 워시 연준 의장의 매파적 발언 이후 나온 첫 핵심 물가지표라는 점에서 시장의 관심이 집중됐다.",
       f3:"CME 페드워치에 따르면 7월 28~29일 FOMC에서 금리 인상 확률은 10%로 급락했다. 매파로 돌아섰던 워시 의장의 입지와 시장 기대가 엇갈리는 구간으로, 자본조달비용·밸류에이션을 다루는 PE·M&A 케이스에서 '중앙은행의 말과 실제 데이터가 충돌할 때 어떻게 판단하는가'를 보여주는 사례다.",
       terms:[{t:"CME 페드워치",d:"시카고상품거래소(CME)가 선물 가격을 바탕으로 산출하는 연준 금리 결정 확률 지표. 시장이 실제로 어떤 금리 경로를 반영하고 있는지 가늠하는 데 널리 쓰인다."}]},
      {tag:"실적",title:"JP모간·골드만삭스, 2분기 사상 최대 실적…트레이딩 수익이 견인",
       source:{name:"CNBC",url:"https://www.cnbc.com/2026/07/14/jpm-bank-of-america-citi-bank-earnings-live-updates.html",date:"2026.07.14"},
       f1:"JP모간체이스가 2분기 순이익 212억달러로 사상 최대 분기 실적을 냈다. 비자 지분 매각 이익 46억달러를 제외해도 169억달러로 여전히 역대 최고 수준이다. 골드만삭스도 창사 이래 최고 분기 실적을 기록했다. 주당순이익 20.98달러로 전년 동기 대비 거의 두 배로 늘었다.",
       f2:"두 은행 모두 시장 변동성 속 트레이딩·딜메이킹 수익 급증이 실적을 견인했다. JP모간의 주식 트레이딩 수익은 전년 대비 86% 급증한 60억달러, 전체 마켓 부문 수익은 121억달러로 1분기 기록을 경신했다. 호르무즈발 지정학 리스크와 금리 불확실성이 오히려 트레이딩 데스크에는 호재로 작용한 셈이다.",
       f3:"변동성이 클수록 대형 투자은행의 트레이딩 수익이 커지는 구조는 '리스크가 곧 수익원'이라는 금융업의 역설을 보여준다. 금융기관 자문을 지망하는 컨설턴트라면, 지정학 리스크가 모든 산업에 악재로만 작용하지 않는다는 점, 즉 산업별로 리스크의 방향성이 다르다는 것을 이번 실적에서 확인할 수 있다.",
       terms:[]}
    ]},
    {id:"tech",no:"03",title:"테크·AI",slug:"Tech·AI",items:[
      {tag:"반도체",title:"TSMC, 2분기 사상 최대 매출…3나노 공정 연말까지 완판",
       source:{name:"CNBC",url:"https://www.cnbc.com/2026/07/13/tsmc-june-revenue-rises-percent-ahead-second-quarter.html",date:"2026.07.13"},
       f1:"TSMC의 6월 매출이 전년 동월 대비 67.9% 급증한 4426억8000만 대만달러로 사상 최대치를 기록했다. 2분기 전체 매출은 1조2700억 대만달러로 자체 가이던스 상단을 웃돌았다.",
       f2:"AI 서버용 GPU·CPU 대부분이 사용하는 3나노(N3) 공정과 첨단 패키징(CoWoS)이 연말까지 완전히 팔린 상태다. 세미애널리시스는 TSMC의 올해 AI 관련 매출이 400억달러를 넘어 전체 매출의 약 25%를 차지할 것으로 추산했다. CoWoS 수요는 올해 약 100만 웨이퍼로, 2024년 전체 수요(약 37만 웨이퍼)의 3배에 육박한다.",
       f3:"파운드리 한 곳의 생산능력이 AI 산업 전체의 성장 속도를 좌우하는 병목이 되고 있다는 뜻이다. 반도체·AI 인프라 클라이언트를 다루는 케이스에서 'CoWoS 같은 후공정 병목을 어떻게 해소할 것인가'는 향후 몇 년간 반복적으로 등장할 주제다.",
       terms:[{t:"CoWoS",d:"Chip-on-Wafer-on-Substrate. TSMC의 첨단 반도체 패키징 기술로, 여러 개의 칩을 하나로 결합해 AI 가속기 성능을 높인다. 최근 AI 반도체 공급의 핵심 병목으로 떠올랐다."}]},
      {tag:"AI",title:"앤트로픽, 삼성전자와 자체 AI 추론칩 개발 논의…2나노 파운드리 검토",
       source:{name:"Bloomberg",url:"https://www.bloomberg.com/news/articles/2026-07-02/anthropic-in-talks-with-samsung-for-custom-ai-chip-information-mr3l34t4",date:"2026.07.02"},
       f1:"앤트로픽이 삼성전자와 자체 AI 추론 전용 칩 개발을 두고 초기 논의를 진행 중이다. 삼성의 2나노 공정과 첨단 패키징 시설 활용이 검토되고 있으며, 칩의 구체적 사양이나 서버 통합 방식은 아직 정해지지 않았다.",
       f2:"삼성전자는 지난 5월 앤트로픽의 650억달러 규모 시리즈H 투자 라운드에 SK하이닉스·마이크론과 함께 전략적 인프라 파트너로 참여한 바 있다. 이번 칩 논의는 라이벌 오픈AI가 브로드컴과 손잡고 자체 추론칩 '할라피뇨'를 발표한 데 대한 대응 성격이 짙다. 앤트로픽은 오픈AI의 커스텀칩 팀 소속 2인자 엔지니어였던 클라이브 챈을 최근 영입하기도 했다.",
       f3:"AI 모델 기업들이 엔비디아 의존을 낮추기 위해 잇따라 자체 칩 개발에 뛰어드는 흐름이다. 매달 12억5000만달러에 달하는 컴퓨팅 비용을 감당해야 하는 앤트로픽 입장에서, 커스텀칩은 원가구조 자체를 바꾸는 카드다. 테크 산업 원가전략을 다루는 컨설턴트라면 '수직계열화를 통한 원가 절감'의 최신 사례로 이 흐름을 참고할 만하다.",
       terms:[{t:"추론칩(Inference Chip)",d:"이미 학습된 AI 모델을 실제 서비스에서 구동(추론)하는 데 특화된 반도체. 모델을 학습시키는 훈련용 칩과 달리 응답 속도·전력효율이 핵심이며, 최근 빅테크들이 엔비디아 GPU 대안으로 앞다퉈 개발 중이다."}]}
    ]},
    {id:"korea",no:"04",title:"한국",slug:"Korea",items:[
      {tag:"통화정책",title:"한국은행, 3년 6개월 만에 금리 인상 나서나…오늘 2.75% 유력",
       source:{name:"한국경제",url:"https://www.hankyung.com/article/2026071202551",date:"2026.07.12"},
       f1:"한국은행 금융통화위원회가 16일 통화정책방향 결정회의를 열고 기준금리를 현재 연 2.50%에서 2.75%로 0.25%포인트 인상할 가능성이 유력하다. 한경 이코노미스트클럽이 설문한 전문가 12명 중 10명이 인상을, 그중 상당수가 만장일치 인상을 전망했다.",
       f2:"실제 인상이 이뤄지면 2023년 1월 이후 3년 6개월 만의 기준금리 인상이다. 지난 6월 소비자물가 상승률이 3.2%로 한은의 물가안정 목표(2%)를 크게 웃돈 데다, 수도권 집값과 가계대출, 원·달러 환율까지 불안한 흐름을 보이면서 한은이 통화 긴축으로 방향을 트는 것이라는 분석이다. 전문가 다수는 연내 추가로 한 차례 더 인상이 이어질 것으로 내다본다.",
       f3:"물가·집값·환율이라는 세 마리 토끼를 동시에 잡아야 하는 한은의 딜레마는 '다목적 정책 수단의 트레이드오프'를 보여주는 교과서적 사례다. 금융기관·부동산 클라이언트를 자문할 때, 기준금리 하나가 예대마진·주택담보대출·환헤지 전략에 동시다발적으로 미치는 파급 경로를 구조화해서 설명할 수 있어야 한다.",
       terms:[{t:"금융통화위원회",d:"한국은행 내 기준금리 등 통화정책을 최종 결정하는 합의체 기구(금통위). 한은 총재를 포함한 7인의 위원으로 구성되며, 연 8회 정례회의를 연다."}]},
      {tag:"부동산정책",title:"이재명 대통령, 23일 부동산 대토론회 주재…보유세·거래세 개편 검토",
       source:{name:"한국경제",url:"https://www.hankyung.com/article/2026071075707",date:"2026.07.10"},
       f1:"이재명 대통령이 오는 23일 부동산 정책 공개 대토론회를 직접 주재한다. 종합부동산세 등 보유세와 양도소득세 등 거래세 개편 방향이 핵심 의제로, 국토교통부·금융위원회·기획재정부가 14~16일 사흘간 공급·금융·세제를 주제로 릴레이 토론회를 먼저 진행한다.",
       f2:"정부는 반도체 호황에 따른 초과세수를 재원으로 하는 '미래대응기금' 조성도 함께 추진 중이며, 내년도 총지출은 올해 대비 10% 이상 늘어난 800조원대로 편성될 전망이다. 이번 세제 개편안은 7월 말~8월 초 최종 발표될 예정으로, 마침 같은 주 한국은행의 기준금리 인상 논의와 시점이 겹치면서 긴축(금리)과 확장(재정)이 동시에 진행되는 정책 조합이 만들어지고 있다.",
       f3:"금리는 올리면서 재정은 확장하고, 부동산 보유세는 강화하면서 거래세는 조정하는 다층적 정책 패키지다. 공공정책 자문을 지망한다면, '초과세수를 어디에 얼마나 배분할 것인가'와 '누구에게 세 부담을 지울 것인가'라는 두 축이 동시에 걸린 이번 논의를 실제 정부 자문 케이스의 축소판으로 봐야 한다.",
       terms:[]}
    ]},
    {id:"japan",no:"05",title:"일본",slug:"Japan · MBB",items:[
      {tag:"M&A",title:"다이니폰인쇄, 협와파마 인수…원료의약품부터 완제품까지 CDMO 일원화",
       source:{name:"日本経済新聞",url:"https://www.nikkei.com/article/DGXZRSP709952_V10C26A7000000/",date:"2026.07.15"},
       f1:"다이니폰인쇄(DNP)가 7월 15일 원료의약품(원약) 제조사 협와파마케미칼의 지분 100%를 10월 중 인수해 자회사로 편입하기로, 주주인 협와발효바이오·기린홀딩스와 주식양도계약을 체결했다. 협와파마는 사명을 'DNP파마케미칼'로 바꿀 예정이다.",
       f2:"협와파마는 트라넥삼산·프로스타글란딘류 등 고난도 유기합성 기술이 필요한 신약 원약을 제조해온 업체다. DNP그룹은 그동안 제네릭 원약 제조(DNP파인케미칼 우쓰노미야)와 제형 개발·생산(CMIC CMO)을 각각 보유하고 있었는데, 이번 인수로 원약 제조부터 완제 의약품, DNP의 강점인 의약품 포장까지 한 그룹 안에서 완결되는 체제를 갖추게 됐다.",

$("#main").innerHTML = html;
const calSrc = (c.sources||[]).map(s=>`<a href="${esc(s.url)}" target="_blank" rel="noopener">${esc(s.name)} ↗</a>`).join(" · ");
$("#main").insertAdjacentHTML("beforeend",`<footer>소스 정책: Bloomberg · CNBC · BBC · ABC · Reuters · AP + 한국 주요 언론 + 일본 니케이·Japan Times 등 + 컨설팅업계 전문 매체 — 작성 시점 검색·교차 확인 기준.<br>전황·시세는 빠르게 변하므로 중요한 판단 전 원문 확인 권장 · 일정 출처: ${calSrc}<br>💡 매일 아침 9:30 KST에 이 페이지가 자동으로 새 브리핑으로 갱신됩니다. · 📚 <a href="archive.html">지난 브리핑 모아보기</a></footer>`);
document.querySelectorAll(".item__head").forEach(h=>{ h.addEventListener("click",()=>{ const it=h.closest(".item"); const open=it.classList.toggle("open"); h.setAttribute("aria-expanded",open?"true":"false"); }); });
const allBtn=$("#toggleAll"), allLab=$("#toggleAllLabel");
allBtn.addEventListener("click",()=>{ const items=[...document.querySelectorAll(".item")]; const anyClosed=items.some(i=>!i.classList.contains("open")); items.forEach(i=>{i.classList.toggle("open",anyClosed); i.querySelector(".item__head").setAttribute("aria-expanded",anyClosed?"true":"false");}); allLab.textContent=anyClosed?"접기":"펼치기"; });
const root=document.documentElement;
$("#theme").addEventListener("click",()=>{root.setAttribute("data-theme", root.getAttribute("data-theme")==="dark"?"light":"dark");});
$("#print").addEventListener("click",()=>window.print());
const links=[...document.querySelectorAll(".navlinks a")];
const spy=new IntersectionObserver(ents=>{ ents.forEach(e=>{if(e.isIntersecting){links.forEach(l=>l.classList.toggle("active",l.dataset.id===e.target.id));}}); },{rootMargin:"-45% 0px -50% 0px"});
document.querySelectorAll("section.block").forEach(s=>spy.observe(s));
</script>
</body>
</html>
