        f1:"미군이 나흘 연속 이란을 공습하며 호르무즈 해협 인근과 이란 해안 지역의 군사 자산을 타격했다. 트럼프는 이란이 협상 테이블에 나오지 않으면 '다음주엔 발전소, 교량까지 모두 파괴하겠다'고 경고했다.",

        f3:"정책(통행료) 후퇴와 군사 행동 강화가 동시에 벌어지는 것은, 트럼프 행정부가 '경제적 명분'은 접었지만 '군사적 억지력'으로 협상력을 유지하려 한다는 신호다. 원자재·물류를 다루는 기업에는 '외교적 해소'와 '군사적 긴장 고조'라는 두 시나리오를 동시에 열어두고 헤지 전략을 짜야 하는 국면이다.",
        terms:[{t:"미 중부사령부(CENTCOM)",d:"중동·중앙아시아 지역을 담당하는 미군 통합전투사령부로, 이번 호르무즈 관련 공습과 해상 봉쇄를 지휘하고 있다."}]}
    ]},
    {id:"econ",no:"02",title:"글로벌 경제·시장",slug:"Economy",items:[
      {tag:"미국 증시",title:"6월 CPI 서프라이즈에 3대 지수 동반 상승…애플 사상 최고가",source:{name:"CNBC",url:"https://www.cnbc.com/2026/07/15/stock-market-today-live-updates.html",date:"2026.07.15"},
        f1:"6월 미국 소비자물가지수(CPI)가 전월 대비 0.4% 하락하며 시장 예상(-0.2%)을 크게 웃도는 둔화세를 보이자, 다우(+0.3%, 52,659.18)·S&P500(+0.4%, 7,572.43)·나스닥(+0.6%, 26,269.23)이 일제히 올랐다. 애플은 4.01% 급등하며 사상 최고가를 새로 썼다.",
        f2:"연준은 지난 6월 회의에서 기준금리를 3.50~3.75%로 동결했고, 인플레이션이 목표치(2%)보다 높다고 평가한 바 있다. 이번 CPI 둔화로 시장은 7월 28~29일 FOMC에서도 금리 동결 가능성을 84.5%로 높여 잡았다. 애플·알파벳·메타·아마존·마이크로소프트 등 빅테크가 나스닥 상승을 이끌었다.",
        f3:"물가 둔화 → 금리 동결(혹은 인하) 기대 → 빅테크 랠리로 이어지는 이 공식은 2026년 내내 반복돼 온 패턴이다. 클라이언트의 자본비용(WACC)과 밸류에이션을 다루는 컨설턴트라면, 금리 경로에 대한 시장 컨센서스가 얼마나 빨리 바뀌는지를 체감해 둘 필요가 있다.",
        terms:[{t:"CPI(소비자물가지수)",d:"가계가 소비하는 재화·서비스 가격 변동을 측정하는 지표로, 연준의 금리 결정에 가장 큰 영향을 미치는 변수."}]},
      {tag:"원자재",title:"WTI, 사흘 연속 상승…통행료는 접었지만 유가는 안 내렸다",source:{name:"CNBC",url:"https://www.cnbc.com/2026/07/15/oil-prices-today-brent-wti-hormuz-blockade.html",date:"2026.07.15"},
        f1:"8월 인도분 WTI는 배럴당 79.60달러(+0.26달러), 브렌트유는 84.95달러(+0.22달러)로 마감하며 사흘 연속 상승했다. 트럼프가 통행료를 접었음에도 미군의 이란 공습과 해상 봉쇄가 계속되며 유가는 3거래일 만에 11% 넘게 뛰었다.",
        f2:"통행료 발표(7월14일) 이후 유가가 급등한 것은 수수료 자체보다 '해군 봉쇄 재개+추가 공습'이라는 실질적 공급 리스크 때문이었다. 통행료를 철회한 15일에도 유가가 크게 꺾이지 않은 것은, 시장이 이미 지정학적 리스크 프리미엄을 별도로 반영하고 있다는 뜻이다.",
        f3:"정책 발표(통행료)와 실물 리스크(봉쇄·공습)가 분리돼 가격에 반영되는 모습은, 원자재를 다루는 애널리스트에게 '뉴스 헤드라인'과 '펀더멘털 리스크'를 구분해서 봐야 한다는 교훈을 준다. 항공·해운·화학 등 유가 민감 업종 클라이언트에게는 즉각적인 헤지 전략 점검이 필요한 시점이다.",
        terms:[{t:"WTI·브렌트유",d:"WTI(서부텍사스산원유)는 미국, 브렌트유는 북해산 원유를 대표하는 국제 유가 벤치마크. 통상 브렌트유가 WTI보다 소폭 높게 거래된다."}]}
    ]},
    {id:"tech",no:"03",title:"테크·AI",slug:"Tech·AI",items:[
      {tag:"AI 안전성",title:"AI 안전성 성적표, 1위 앤트로픽도 C+…'경쟁 속도가 안전을 앞질렀다'",source:{name:"Future of Life Institute",url:"https://futureoflife.org/ai-safety-index-summer-2026/",date:"2026.07.07"},
        f1:"퓨처오브라이프연구소(FLI)가 발표한 2026년 여름 AI 안전성 지수에서 앤트로픽이 C+로 9개 AI 기업 중 1위를 차지했고, 오픈AI·구글 딥마인드는 C, 메타는 D+, xAI·딥시크·미스트랄은 낙제점을 받았다.",
        f2:"FLI는 37개 지표를 통해 리스크 평가, 현재 위해, 안전 프레임워크, 실존적 안전, 거버넌스, 투명성 등 6개 영역을 평가했다. 보고서는 '최상위 기업들의 현재 안전 조치조차 AI 역량 발전 속도에 비해 완전히 불충분하다'고 지적했으며, 앤트로픽·오픈AI·구글 딥마인드 모두 스스로 정한 '레드라인'에 도달하면 개발을 중단하겠다는 이전 서약을 약화시키거나 철회한 것으로 나타났다.",
        f3:"안전 성적표에서 최고 점수가 C+에 그친다는 것은, AI 경쟁이 안전장치보다 훨씬 빠르게 질주하고 있다는 의미다. AI 도입을 자문하는 컨설턴트라면 클라이언트에게 '어떤 모델이 가장 똑똑한가'뿐 아니라 '어떤 벤더가 거버넌스·리스크 관리 체계를 갖췄는가'까지 실사(due diligence) 항목에 넣어야 한다.",
        terms:[{t:"레드라인(Red line)",d:"AI 기업이 스스로 정한, 이를 넘으면 개발을 중단하겠다고 약속한 위험 임계선."}]},
      {tag:"규제",title:"중국 'AI 동반자' 규제 시행 첫날…도우바오·큐원 에이전트 일제히 중단",source:{name:"Tech Times",url:"https://www.techtimes.com/articles/320525/20260715/china-ai-companion-law-takes-effect-doubao-qwen-shut-down-millions-lose-chat-data.htm",date:"2026.07.15"},
        f1:"중국의 'AI 인격화 상호작용 서비스 관리 임시조치'가 7월15일부로 시행되며, 바이트댄스의 도우바오와 알리바바의 큐원(Qwen)이 수억 명이 쓰던 '인격화 에이전트' 기능을 일제히 껐다.",
        f2:"이 규정은 지난 4월 중국 국가인터넷정보판공실 등 5개 부처가 공동 발표한 것으로, 실제 인간관계를 대체할 만큼 강한 정서적 애착을 유도하는 기능, 미성년자 정서 타겟팅, 개인 대화 학습을 금지한다. '업무를 대신하는 에이전트'와 '정서적으로 곁에 있어주는 에이전트'를 구분해 후자만 규제한 것이 핵심이다. 도우바오는 10월15일까지 대화 기록 열람만 허용하고, 큐원은 별도 이관 절차 없이 데이터를 영구 삭제하기로 했다.",
        f3:"중국이 'AI와의 정서적 의존'을 명시적 규제 대상으로 못박은 첫 사례로, 유럽·한국 등 다른 규제 당국에도 참고 사례가 될 가능성이 크다. AI 프로덕트를 자문하는 컨설턴트에게는 '업무형 에이전트'와 '동반자형 에이전트'를 규제·리스크 관점에서 분리해 설계해야 한다는 시사점을 준다.",
        terms:[{t:"인격화 에이전트(Anthropomorphic agent)",d:"인간처럼 인격·감정을 지닌 것처럼 상호작용하도록 설계된 AI 에이전트. 중국 규제는 '업무 대행형 에이전트'는 규제 대상에서 제외하고 이 유형만 겨냥했다."}]}
    ]},
    {id:"korea",no:"04",title:"한국",slug:"Korea",items:[
      {tag:"증시",title:"코스피 6.24% 급반등, 매수 사이드카 발동…반도체 투심 회복",source:{name:"경향신문",url:"https://www.khan.co.kr/article/202607151720001/",date:"2026.07.15"},
        f1:"코스피가 전 거래일보다 6.24% 오른 7284.41에 마감하며 7000선을 회복했다. 코스닥도 5.80% 상승한 829.43으로 마쳤고, 장 초반 급등세에 유가증권시장에서는 올해 들어 36번째 매수 사이드카가 발동됐다.",
        f2:"그동안 삼성전자·SK하이닉스 등 반도체 대장주가 필라델피아반도체지수 급락과 'AI 데이터센터 공급과잉' 우려 속에 약세를 보이며 코스피 조정을 주도해왔다. 이날은 이 두 종목이 반등을 이끌며 지수 상승분의 상당 부분을 만들어냈는데, 삼성전자·SK하이닉스가 코스피 시가총액의 약 40%를 차지하고 있어 이들 종목의 방향이 곧 지수의 방향이 되는 구조다.",
        f3:"메모리 반도체 사이클에 대한 우려와 기대가 하루 만에 뒤바뀌며 지수가 요동치는 모습은, 반도체 한 업종에 지나치게 쏠린 한국 증시 구조의 리스크를 보여준다. 반도체 클라이언트를 자문할 때는 '기술 펀더멘털'과 '시장 심리(투자심리)'를 분리해서 진단하는 습관이 필요하다.",
        terms:[{t:"사이드카(Sidecar)",d:"선물 가격이 일정폭 이상 급등락할 때 프로그램 매매 호가 효력을 5분간 정지시키는 시장 안전장치."}]},
      {tag:"반도체 소재",title:"삼성전기, 일본 스미토모화학 자회사와 유리기판 소재 합작사 '글라셈' 설립",source:{name:"전자신문",url:"https://www.etnews.com/20260702000429",date:"2026.07.02"},
        f1:"삼성전기가 일본 스미토모화학그룹의 한국 자회사 동우화인켐과 손잡고 차세대 반도체 기판 소재인 '글라스 코어' 생산 합작법인 '글라셈(GlaSSEM)'을 설립한다. 총 출자 규모는 약 4800억원, 지분율은 삼성전기 66%·동우화인켐 34%다.",
        f2:"유리기판은 기존 플라스틱 기판보다 열팽창률이 낮고 평탄도가 뛰어나 대면적·고집적 반도체 패키지에 필수적인 차세대 소재로 꼽힌다. 본사와 생산거점은 경기 평택 동우화인켐 사업장에 마련되며, 2027년 하반기 양산이 목표다.",
        f3:"AI 반도체 경쟁이 '연산 성능'에서 '패키징·기판 기술'로 옮겨가고 있음을 보여주는 딜이다. 한일 기업이 소재 국산화·이원화를 위해 합작사를 세우는 방식은, 공급망 리스크를 줄이려는 반도체 업계 전반의 트렌드와 맞닿아 있어 관련 산업을 다루는 컨설턴트가 눈여겨볼 대목이다.",
        terms:[{t:"글라스 코어(Glass core)",d:"유리기판의 중심 뼈대를 이루는 핵심 소재층. 기존 플라스틱 기판보다 열팽창률이 낮고 평탄도가 우수해 차세대 반도체 패키징에 쓰인다."}]}
    ]},
    {id:"japan",no:"05",title:"일본",slug:"Japan · MBB",items:[
      {tag:"증시",title:"닛케이 1008엔 급등 마감…한국發 반등에 ASML 실적까지 겹호재",source:{name:"世界一やさしい投資の学校",url:"https://tbladvisory.com/20260715nk/",date:"2026.07.15"},
        f1:"7월15일 도쿄 증시에서 닛케이평균주가는 전일 대비 1008엔 오른 6만8751엔에 마감했다. 토픽스(TOPIX)도 49.14포인트(+1.22%) 오른 4088.12를 기록했다.",
        f2:"전날 미국 반도체주 강세 흐름을 이어받아 장 초반부터 1000엔 넘게 뛰었다. 중동 정세 긴장으로 한때 상승폭을 반납하기도 했지만, 장 중반 이후 한국 코스피의 급등세에 힘입어 다시 상승폭을 키웠다. 네덜란드 반도체 장비업체 ASML의 호실적 소식도 전해지며 추가 상승 동력이 됐다.",
        f3:"한국과 일본 증시가 반도체 밸류체인을 매개로 사실상 한 몸처럼 움직이는 모습은, 아시아 반도체 공급망이 얼마나 촘촘하게 얽혀 있는지를 보여준다. 일본 시장을 다루는 컨설턴트라면 '일본만의 재료'보다 '한국·대만발 공급망 신호'를 함께 읽어야 하는 이유다.",
        vocab:{w:"一巡",r:"いちじゅん",m:"'한 바퀴 돎'이라는 뜻으로, 증시에서는 '買い一巡後(초기 매수세가 한 차례 돌고 잦아든 뒤)'처럼 매매 물량이 초반에 소진된 상태를 가리키는 표현."}},

if(BRIEFING.think){ const th=BRIEFING.think; const stepsHtml=(th.steps||[]).map(s=>`<li><b>${esc(s.label)}</b> — ${esc(s.detail)}</li>`).join(""); html += `<section class="block" id="think"><div class="think"><span class="tk">💭 오늘의 생각거리 — 컨설턴트처럼 생각하기</span><p>${esc(th.q)}</p><ol class="steps">${stepsHtml}</ol><div class="hint">${th.hint||""}</div></div></section>`; }
const c = BRIEFING.calendar || {macro:[],earnings:[],sources:[]};
html += `<section class="block" id="cal"><div class="shead"><span class="no">📅</span><h2>다가오는 일정</h2><span class="slug">watchlist</span></div><div class="terms" style="border-style:solid">${[...(c.macro||[]),...(c.earnings||[])].map(r=>`<div class="t"><b>${esc(r.date)} ${esc(r.reg||"")} ${esc(r.ev)}</b>${r.nt?` — ${esc(r.nt)}`:""}</div>`).join("")}<div class="th" style="margin-top:8px">${esc(c.note||"")}</div></div></section>`;
$("#main").innerHTML = html;
const calSrc = (c.sources||[]).map(s=>`<a href="${esc(s.url)}" target="_blank" rel="noopener">${esc(s.name)} ↗</a>`).join(" · ");
$("#main").insertAdjacentHTML("beforeend",`<footer>소스 정책: Bloomberg · CNBC · BBC · ABC · Reuters · AP + 한국 주요 언론 + 일본 니케이·Japan Times 등 + 컨설팅업계 전문 매체 — 작성 시점 검색·교차 확인 기준.<br>전황·시세는 빠르게 변하므로 중요한 판단 전 원문 확인 권장 · 일정 출처: ${calSrc}<br>💡 매일 아침 9:30 KST에 이 페이지가 자동으로 새 브리핑으로 갱신됩니다. · 📚 <a href="archive.html">지난 브리핑 모아보기</a></footer>`);
document.querySelectorAll(".item__head").forEach(h=>{ h.addEventListener("click",()=>{ const it=h.closest(".item"); const open=it.classList.toggle("open"); h.setAttribute("aria-expanded",open?"true":"false"); }); });
const allBtn=$("#toggleAll"), allLab=$("#toggleAllLabel");
allBtn.addEventListener("click",()=>{ const items=[...document.querySelectorAll(".item")]; const anyClosed=items.some(i=>!i.classList.contains("open")); items.forEach(i=>{i.classList.toggle("open",anyClosed); i.querySelector(".item__head").setAttribute("aria-expanded",anyClosed?"true":"false");}); allLab.textContent=anyClosed?"접기":"펼치기"; });
const root=document.documentElement;
$("#theme").addEventListener("click",()=>{root.setAttribute("data-theme", root.getAttribute("data-theme")==="dark"?"light":"dark");});
$("#print").addEventListener("click",()=>window.print());
const links=[...document.querySelectorAll(".navlinks a")];
const spy=new IntersectionObserver(ents=>{ ents.forEach(e=>{if(e.isIntersecting){links.forEach(l=>l.classList.toggle("active",l.dataset.id===e.target.id));}}); },{rootMargin:"-45% 0px -50% 0px"});
document.querySelectorAll("section.block").forEach(s=>spy.observe(s));
</script>
</body>
</html>
