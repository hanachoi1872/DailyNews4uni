       f1:"볼로디미르 젤렌스키 우크라이나 대통령이 올렉산드르 시르스키 우크라이나군 총사령관을 전격 경질하고, 43세의 미하일로 드라파티 장군을 후임으로 임명했다. 키이우를 비롯한 전국 각지에서 시르스키 경질을 요구하는 대규모 시위가 이어진 직후 나온 결정이다.",

       f3:"전쟁이 4년 차에 접어들며 군사 리더십조차 여론과 정치적 압력에 의해 재편되는 모습을 보여준다. 국방·재건 클라이언트를 다루는 컨설턴트라면, 우크라이나의 지휘체계 개편이 향후 드론·방산 조달 우선순위에 어떤 변화를 가져올지 예의주시할 필요가 있다.",
       terms:[]}

    {id:"econ",no:"02",title:"글로벌 경제·시장",slug:"Economy",items:[
      {tag:"실적",title:"알파벳, 클라우드 매출 82% 급증…역대급 실적에도 설비투자 확대에 주가는 하락",
       source:{name:"CNBC",url:"https://www.cnbc.com/2026/07/22/google-earnings-q2-goog-live-updates.html",date:"2026.07.22"},
       f1:"알파벳의 2분기 매출이 전년 대비 24% 늘어난 1198억달러를 기록했다. 구글 클라우드 매출이 82% 급증한 248억달러를 기록하며 성장을 견인했고, 클라우드 수주잔고(백로그)는 전 분기 대비 500억달러 이상 늘어난 5140억달러로 집계됐다.",
       f2:"클라우드 영업이익은 88억달러로 3배 이상 늘었고 영업이익률도 20.7%에서 35.6%로 뛰었다. 그럼에도 회사가 2026년 설비투자(capex) 가이던스를 상향 조정하자 주가는 실적 발표 후 하락했다. AI 인프라에 대한 지출이 언제 이익으로 전환될지에 대한 투자자들의 불안감이 여전하다는 뜻이다.",
       f3:"'실적은 사상 최대인데 주가는 떨어지는' 역설은 AI 투자 사이클에서 반복되는 패턴이다. 테크 산업 재무자문을 지망하는 컨설턴트라면, 매출 성장률만이 아니라 '설비투자 대비 이익 전환 시점(payback)'을 어떻게 시장에 설득력 있게 제시할 것인가가 AI 시대 CFO 자문의 핵심 과제라는 점을 이 사례에서 읽어야 한다.",
       terms:[{t:"클라우드 백로그",d:"고객과 계약은 체결됐지만 아직 매출로 인식되지 않은 미래 수주잔고. 알파벳의 경우 이 중 절반가량이 향후 24개월 내 매출로 잡힐 예정이며, 클라우드 사업의 성장 가시성을 보여주는 핵심 지표로 쓰인다."}]},
      {tag:"통화정책",title:"유가 급등에 Fed 7월 금리 인상 확률도 재상승…34%까지 반등",
       source:{name:"CNBC",url:"https://www.cnbc.com/2026/07/22/treasury-yields-fed-rate-hike-bets.html",date:"2026.07.22"},
       f1:"CME 페드워치 기준 7월 28~29일 FOMC에서 연준이 기준금리를 0.25%포인트 인상할 확률이 34%로 집계됐다. 9월 회의까지 포함하면 인상 확률은 78%까지 올라간다. 이 여파로 미 10년물 국채 금리도 상승했다.",
       f2:"7월 중순 CPI 둔화로 10%대까지 떨어졌던 인상 확률이 다시 반등한 배경은 이란-미국 갈등에 따른 유가 급등이다. 브렌트유가 한 달 내 최고치인 배럴당 94달러를 넘어서면서, 에너지발 인플레이션 재점화 우려가 시장의 금리 기대를 다시 밀어올리고 있다.",
       f3:"'물가 지표'와 '지정학 리스크'라는 서로 다른 두 변수가 같은 결론(금리 인상 압력)으로 수렴하는 흔치 않은 국면이다. 매크로 시나리오를 다루는 컨설턴트라면, 이처럼 서로 독립적인 변수들이 우연히 같은 방향으로 겹칠 때 예측의 불확실성이 오히려 커진다는 점을 놓치지 말아야 한다.",
       terms:[]}
    ]},
    {id:"tech",no:"03",title:"테크·AI",slug:"Tech·AI",items:[
      {tag:"AI인프라",title:"엔비디아, 자체 AI 서버용 CPU '베라' 출시…AMD·인텔에 정면 도전",
       source:{name:"CNBC",url:"https://www.cnbc.com/2026/07/21/nvidia-vera-cpu-ai-amd-intel.html",date:"2026.07.21"},
       f1:"엔비디아가 AI 서버용 자체 중앙처리장치(CPU) '베라(Vera)'를 공개하고 차세대 '베라 루빈(Vera Rubin)' 시스템을 주요 AI 기업들에 인도하기 시작했다고 밝혔다. 이언 벅 엔비디아 부사장은 고객사들이 베라를 평가하는 데 필요한 세부 정보를 추가로 공개했다고 전했다.",
       f2:"그동안 엔비디아는 GPU(그래픽처리장치)에 집중하고 CPU는 AMD·인텔 등에 맡겨왔지만, 이번 베라 출시로 AI 서버의 두뇌 역할까지 직접 장악하려는 행보를 본격화했다. AI 서버 한 대의 성능은 GPU뿐 아니라 CPU와의 결합 방식에 따라 크게 좌우되는데, 엔비디아는 이 둘을 자체 설계로 묶어 경쟁사가 따라오기 어려운 통합 아키텍처를 만들려 하고 있다.",
       f3:"GPU 시장의 지배자가 CPU 영역까지 넘보는 것은 '인접 영역 수직 확장을 통한 진입장벽 강화'의 교과서적 사례다. 반도체·AI 인프라 전략을 다루는 컨설턴트라면, 한 기업이 밸류체인의 어느 지점을 장악했을 때 인접 단계로 확장하는 것이 방어인지 공격인지를 구분해 조언할 수 있어야 한다.",
       terms:[{t:"GPU vs CPU",d:"GPU는 병렬 연산에 특화돼 AI 모델의 대규모 행렬 연산(학습·추론)을 담당하고, CPU는 시스템 전체를 제어하는 범용 처리장치다. AI 서버는 통상 소수의 CPU와 다수의 GPU를 조합해 구성한다."}]},
      {tag:"IPO",title:"中 광트랜시버 업체 중지이노라이트, 홍콩증시 7조원 규모 IPO 추진",
       source:{name:"Bloomberg",url:"https://www.bloomberg.com/news/articles/2026-07-21/innolight-seeks-up-to-7-billion-in-biggest-hong-kong-listing-in-years",date:"2026.07.21"},
       f1:"중국 광통신 부품업체 중지이노라이트(Zhongji Innolight)가 홍콩 증시 상장을 통해 최대 550억5000만 홍콩달러(약 70억달러)를 조달하는 방안을 추진 중이다. 초과배정옵션이 모두 행사되면 조달 규모는 최대 81억달러까지 늘어날 수 있다. 최종 공모가는 7월 29일 확정되며 다음 날 거래가 시작될 예정이다.",
       f2:"이번 상장이 성사되면 2019년 알리바바 상장(129억달러) 이후 약 7년 만에 홍콩 증시 최대 규모 공모가 된다. 중지이노라이트는 데이터센터 서버·스위치 간 초고속 데이터 전송을 담당하는 광트랜시버(광송수신 모듈) 전문업체로, 엔비디아 생태계와 밀접하게 연계돼 AI 데이터센터 구축 붐의 수혜를 직접적으로 누리고 있다.",
       f3:"AI 인프라 투자 붐의 수혜가 GPU 제조사를 넘어 광케이블·트랜시버 같은 '연결' 부품업체로까지 번지고 있음을 보여주는 사례다. 자본시장·산업 자문을 지망하는 컨설턴트라면, AI 밸류체인에서 스포트라이트를 받지 못하는 후방 부품업체들의 기업가치가 어떻게 재평가되는지를 놓치지 말아야 한다.",
       terms:[{t:"광트랜시버(Optical Transceiver)",d:"전기 신호를 광신호로 변환해 광케이블을 통해 데이터를 초고속 전송하는 부품. 데이터센터 내 서버·스위치를 연결하는 핵심 부품으로, AI 데이터센터의 트래픽이 늘어날수록 수요가 함께 늘어난다."}]}
    ]},
    {id:"korea",no:"04",title:"한국",slug:"Korea",items:[
      {tag:"외환",title:"원·달러 환율, 한 달 새 1550원→1400원대 후반…정부, 수출기업에 '즉시 환전' 요청",
       source:{name:"한국경제",url:"https://www.hankyung.com/article/2026071928141",date:"2026.07.19"},
       f1:"원·달러 환율이 6월 수출기업 간담회 직전 1550원대까지 올랐던 데서 최근 1400원대 후반까지 단기간에 하락했다. 허장 기획재정부 2차관은 7월 21일 삼성전자·SK하이닉스·현대차·기아·HD한국조선해양·한화오션·삼성중공업 등 주요 수출기업과 간담회를 열고 이 같은 흐름을 점검했다.",
       f2:"환율 하락은 수출기업의 선물환 매도 확대, 조선사들의 선물환 매도, SK하이닉스의 미국預託증서(ADR) 발행 자금 유입 등이 겹치며 나타난 결과다. 허 차관은 '수급 쏠림이 일부 완화되고 있다'면서도 중동 전쟁 등 대외 불확실성이 여전하다고 지적하고, 기업들에 수출대금·외화예금의 즉시 환전과 해외 유보자금의 국내 유입 확대를 당부했다.",
       f3:"환율 하락이 정책 개입이 아니라 기업들의 자발적 헤지·자금 유입이 겹친 '시장 요인'이라는 점이 핵심이다. 금융·수출기업 자문을 지망하는 컨설턴트라면, 환율처럼 여러 변수가 동시에 작용하는 지표를 다룰 때 '무엇이 일시적 쏠림이고 무엇이 구조적 변화인지'를 구분해내는 역량이 중요하다.",
       terms:[{t:"선물환 매도",d:"기업이 미래 특정 시점에 외화를 미리 정한 환율로 팔기로 약정하는 거래. 수출기업이 향후 받을 달러 대금을 선물환으로 미리 매도하면 원화 매수 압력이 생겨 환율 하락(원화 강세) 요인으로 작용한다."}]},
      {tag:"부동산정책",title:"이재명 대통령, 오늘 부동산 국민 대토론회 주재…보유세·거래세 개편 최종 조율",
       source:{name:"경향신문",url:"https://www.khan.co.kr/article/202607211643001/",date:"2026.07.21"},
       f1:"이재명 대통령이 23일 오전 10시부터 100분간 '부동산 국민 대토론회'를 직접 주재한다. 학계 전문가·연구원과 함께 맘카페 운영진·유튜버·공인중개사 등 총 140여 명이 참석해 공급(진미윤 명지대 교수)·금융(김영도 한국금융연구원 선임연구위원)·세제(강성훈 교수) 세 주제로 각 5분씩 발제한 뒤 자유토론을 갖는다.",
       f2:"핵심 쟁점은 종합부동산세 등 보유세의 적정 수준, 보유세와 거래세(양도소득세)의 관계, 보유세수의 용도, 그리고 실거주·비거주·초고가 주택에 세금을 차등 부과할지 여부다. 이번 토론회에서 나온 의견은 법정 시한상 7월 말~8월 초 발표될 최종 세제 개편안에 반영될 예정이다.",
       f3:"정부 정책이 전문가 토론을 넘어 유튜버·맘카페까지 참여시켜 여론을 사전에 수렴하는 방식으로 설계된 점이 눈에 띈다. 공공정책 자문을 지망한다면, 정책의 '내용'만이 아니라 이를 국민에게 설득하고 합의를 끌어내는 '프로세스 설계' 자체가 컨설팅의 대상이 될 수 있다는 점을 이 사례에서 확인할 수 있다.",
       terms:[{t:"종합부동산세",d:"일정 기준을 초과하는 주택·토지 보유자에게 부과하는 국세(종부세). 보유세의 대표 항목으로, 이번 대토론회에서 적정 세율·과세 기준 등이 핵심 쟁점으로 다뤄진다."}]}
    ]},
    {id:"japan",no:"05",title:"일본",slug:"Japan · MBB",items:[
      {tag:"환율",title:"엔화, 40년 만에 최저 163엔대…日 정부 '결단력 있는 대응' 경고",
       source:{name:"CNBC",url:"https://www.cnbc.com/2026/07/22/yen-slides-past-163-raising-intervention-alert.html",date:"2026.07.22"},
       f1:"엔화가 달러당 163엔을 넘어서며 1986년 이후 40년 만의 최저치를 기록했다. 가타야마 사쓰키 일본 재무상은 '엔화 약세가 과도할 경우 결단력 있는 조치를 취하겠다'고 경고했지만, 일본 정부는 아직 실제 개입에는 나서지 않고 있다.",
       f2:"엔화 약세는 미 국채 금리 상승과 미-이란 갈등에 따른 안전자산 달러 수요, 일본은행(BOJ)의 완만한 금리 정상화 속도가 겹친 결과다. 일본은 올해 이미 약 730억달러를 투입해 사상 최대 규모의 시장 개입을 단행했지만 엔화 하락세를 꺾지 못했다. 다만 22일 블룸버그가 'BOJ가 시장 예상보다 빠른 속도의 추가 금리 인상에 열려 있다'고 보도하자 엔화는 소폭 반등했다.",

const navItems = [...BRIEFING.sections.map(s=>({id:s.id,no:s.no,title:s.title})), {id:"think",no:"💭",title:"생각거리"},{id:"cal",no:"📅",title:"일정"}];
$("#nav").innerHTML = navItems.map(n=> `<a href="#${n.id}" data-id="${n.id}"><span class="n">${esc(n.no)}</span>${esc(n.title)}</a>`).join("");
function srcHtml(s){ if(!s) return ""; const link = s.url ? ` · <a href="${esc(s.url)}" target="_blank" rel="noopener">원문(${esc(s.date)})↗</a>` : (s.date?` · ${esc(s.date)}`:""); return `<span class="item__src">${esc(s.name)}${link}</span>`; }
function fieldRow(lab,val,cls){return val?`<div class="field ${cls||""}"><span class="lab">${lab}</span><span class="val">${val}</span></div>`:""}
function termsRow(terms){ if(!terms||!terms.length) return ""; return `<div class="terms"><div class="th">📖 용어 풀이</div>${terms.map(t=>`<div class="t"><b>${esc(t.t)}</b> — ${esc(t.d)}</div>`).join("")}</div>`; }
function vocabRow(v){ if(!v) return ""; return `<div class="jword"><span class="jw-badge">🇯🇵 오늘의 비즈니스 일본어</span><span class="jw-text"><b>${esc(v.w)}</b> <span class="jw-r">(${esc(v.r)})</span> — ${esc(v.m)}</span></div>`; }
function itemCard(it){ return `<article class="item open"><button class="item__head" aria-expanded="true" type="button"><span class="tag">${esc(it.tag)}</span><span><span class="item__title">${esc(it.title)}</span><br>${srcHtml(it.source)}</span><span class="chev">▾</span></button><div class="item__wrap"><div class="item__body"><div class="item__inner">${fieldRow("무슨 일",it.f1)}${fieldRow("그동안의 이야기",it.f2,"story")}${fieldRow("So What",it.f3)}${termsRow(it.terms)}${vocabRow(it.vocab)}</div></div></div></article>`; }
let html = BRIEFING.sections.map(s=>`<section class="block" id="${s.id}"><div class="shead"><span class="no">${esc(s.no)}</span><h2>${esc(s.title)}</h2><span class="slug">${esc(s.slug)}</span></div>${s.items.map(itemCard).join("")}</section>`).join("");
if(BRIEFING.think){ const th=BRIEFING.think; const stepsHtml=(th.steps||[]).map(s=>`<li><b>${esc(s.label)}</b> — ${esc(s.detail)}</li>`).join(""); html += `<section class="block" id="think"><div class="think"><span class="tk">💭 오늘의 생각거리 — 컨설턴트처럼 생각하기</span><p>${esc(th.q)}</p><ol class="steps">${stepsHtml}</ol><div class="hint">${th.hint||""}</div></div></section>`; }
const c = BRIEFING.calendar || {macro:[],earnings:[],sources:[]};
html += `<section class="block" id="cal"><div class="shead"><span class="no">📅</span><h2>다가오는 일정</h2><span class="slug">watchlist</span></div><div class="terms" style="border-style:solid">${[...(c.macro||[]),...(c.earnings||[])].map(r=>`<div class="t"><b>${esc(r.date)} ${esc(r.reg||"")} ${esc(r.ev)}</b>${r.nt?` — ${esc(r.nt)}`:""}</div>`).join("")}<div class="th" style="margin-top:8px">${esc(c.note||"")}</div></div></section>`;
$("#main").innerHTML = html;
const calSrc = (c.sources||[]).map(s=>`<a href="${esc(s.url)}" target="_blank" rel="noopener">${esc(s.name)} ↗</a>`).join(" · ");
$("#main").insertAdjacentHTML("beforeend",`<footer>소스 정책: Bloomberg · CNBC · BBC · ABC · Reuters · AP + 한국 주요 언론 + 일본 니케이·Japan Times 등 + 컨설팅업계 전문 매체 — 작성 시점 검색·교차 확인 기준.<br>전황·시세는 빠르게 변하므로 중요한 판단 전 원문 확인 권장 · 일정 출처: ${calSrc}<br>💡 매일 아침 9:30 KST에 이 페이지가 자동으로 새 브리핑으로 갱신됩니다. · 📚 <a href="archive.html">지난 브리핑 모아보기</a></footer>`);
document.querySelectorAll(".item__head").forEach(h=>{ h.addEventListener("click",()=>{ const it=h.closest(".item"); const open=it.classList.toggle("open"); h.setAttribute("aria-expanded",open?"true":"false"); }); });
const allBtn=$("#toggleAll"), allLab=$("#toggleAllLabel");
allBtn.addEventListener("click",()=>{ const items=[...document.querySelectorAll(".item")]; const anyClosed=items.some(i=>!i.classList.contains("open")); items.forEach(i=>{i.classList.toggle("open",anyClosed); i.querySelector(".item__head").setAttribute("aria-expanded",anyClosed?"true":"false");}); allLab.textContent=anyClosed?"접기":"펼치기"; });
const root=document.documentElement;
$("#theme").addEventListener("click",()=>{root.setAttribute("data-theme", root.getAttribute("data-theme")==="dark"?"light":"dark");});
$("#print").addEventListener("click",()=>window.print());
const links=[...document.querySelectorAll(".navlinks a")];
const spy=new IntersectionObserver(ents=>{ ents.forEach(e=>{if(e.isIntersecting){links.forEach(l=>l.classList.toggle("active",l.dataset.id===e.target.id));}}); },{rootMargin:"-45% 0px -50% 0px"});
document.querySelectorAll("section.block").forEach(s=>spy.observe(s));
</script>
</body>
</html>
