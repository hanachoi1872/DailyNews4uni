       f2:"미군은 이날로 12일 연속 이란 내 목표물 공습을 이어갔다. 이미 호르무즈 해협은 미군의 봉쇄 재개로 최근 24시간 통항 선박이 9척까지 줄어든 상태였는데, 이번 후티 공격으로 세계 무역의 약 12%(글로벌 컨테이너 물동량의 4분의 1)가 지나는 밥엘만데브·수에즈 항로까지 위협권에 들어갔다. 골드만삭스는 공급 차질이 이어질 경우 4분기 브렌트유가 배럴당 120달러를 넘어설 수 있다고 전망했다.",
       f3:"호르무즈에 이어 밥엘만데브까지, 서로 다른 두 개의 해상 병목이 동시에 흔들리는 것은 흔치 않은 상황이다. 에너지·해운·소비재 공급망 클라이언트를 다루는 컨설턴트라면, 리스크가 하나의 경로에 집중된 경우와 달리 복수의 병목이 동시에 위협받을 때는 우회 항로 하나만으로는 답이 되지 않는다는 점, 즉 대안 경로 자체를 다변화해야 한다는 점을 구조화해 짚어야 한다.",
       terms:[{t:"밥엘만데브 해협",d:"홍해와 아덴만을 잇는 좁은 해협으로, 유럽·아시아를 오가는 수에즈 운하 항로의 관문이다. 세계 무역의 약 12%, 컨테이너 물동량의 4분의 1이 이곳을 통과한다."}]},
      {tag:"규제",title:"EU, 구글에 사상 첫 디지털시장법 위반 과징금 8900억원…60일 내 검색 개편 명령",
       source:{name:"CNBC",url:"https://www.cnbc.com/2026/07/23/google-1-billion-eu-fine-dma.html",date:"2026.07.23"},
       f1:"유럽연합(EU) 집행위원회가 구글에 디지털시장법(DMA) 위반으로 8억9000만유로(약 1조3000억원, 약 10억달러)의 과징금을 부과했다고 밝혔다. DMA 시행 이후 구글에 부과된 첫 제재로, 검색에서 자사 서비스를 우대한 행위(자사우대)에 4억6000만유로, 구글플레이에서 개발자들의 외부 결제 유도를 제한한 행위(스티어링 제한)에 4억3000만유로가 각각 부과됐다.",
       f2:"EU 규제당국은 구글이 쇼핑·호텔·교통·스포츠 검색 결과에서 자사 서비스를 눈에 띄게 배치하면서 경쟁사 서비스는 동등한 노출 기회를 주지 않았다고 판단했다. 구글은 60일 이내에 검색·플레이스토어 운영 방식을 시정해야 하며, 기한을 넘기면 하루 단위로 추가 과징금이 부과될 수 있다.",
       f3:"미국 빅테크에 대한 EU의 첫 DMA 실제 집행 사례라는 점에서, 앞으로 애플·메타·아마존 등 다른 '게이트키퍼' 기업들에 대한 제재의 전례가 될 가능성이 크다. 규제·정책 자문을 지망하는 컨설턴트라면, 플랫폼 기업의 자사우대가 어디까지 '정당한 사업 전략'이고 어디부터 '반경쟁 행위'인지 가르는 기준이 지역별로 어떻게 달라지는지를 케이스별로 축적해둘 필요가 있다.",
       terms:[{t:"디지털시장법(DMA)",d:"EU가 대형 플랫폼 기업('게이트키퍼')의 시장 지배력 남용을 규제하기 위해 2023년부터 시행한 법. 자사우대, 끼워팔기, 데이터 결합 등을 금지하며 위반 시 전 세계 매출의 최대 10%까지 과징금을 부과할 수 있다."}]}
    ]},
    {id:"econ",no:"02",title:"글로벌 경제·시장",slug:"Economy",items:[
      {tag:"실적",title:"알파벳·테슬라, 설비투자 급증 공포에 실적 발표 후 시가총액 수천억달러 증발",
       source:{name:"CNBC",url:"https://www.cnbc.com/2026/07/23/tesla-tsla-alphabet-googl-stock-today.html",date:"2026.07.23"},
       f1:"알파벳과 테슬라 주가가 2분기 실적 발표 다음 날인 7월 23일 각각 7%, 14% 급락하며 시가총액 수천억달러가 하루 만에 증발했다. 두 회사 모두 2분기 잉여현금흐름(FCF)이 마이너스를 기록했는데, 급격히 늘어난 AI 설비투자(capex)가 원인이다. 이 여파로 다우지수는 0.97%, S&P500은 1.21%, 나스닥은 2.15% 하락 마감했다.",
       f2:"알파벳은 올해 설비투자 가이던스를 기존 1800억~1900억달러에서 1950억~2050억달러로 상향했고 2027년에는 더 늘어날 수 있다고 예고했다. 테슬라의 2분기 설비투자는 전년 대비 142% 급증한 57억9000만달러였으며, 올해 전체로는 250억달러 이상을 지출할 것으로 예상된다. 일론 머스크 테슬라 CEO는 실적 콜에서 '지금까지 본 것 중 최고의 capex 수익률이 될 것'이라고 자신했지만 투자자들은 반응하지 않았다.",
       f3:"'매출은 견조한데 주가는 폭락하는' 이 패턴은 AI 투자 사이클에서 반복되고 있다. 재무자문·IR 전략을 지망하는 컨설턴트라면, 이제 실적 발표에서 매출·이익 성장률 못지않게 '이 capex가 언제 잉여현금흐름 흑자로 전환되는가'에 대한 설득력 있는 답을 CFO에게 제공하는 것이 핵심 과제라는 점을 이 사례에서 읽어야 한다.",
       terms:[{t:"잉여현금흐름(FCF)",d:"영업활동으로 벌어들인 현금에서 설비투자 등 자본적 지출을 뺀 금액. AI 인프라 투자가 급증하면서 알파벳·테슬라 등 빅테크의 FCF가 마이너스로 전환되는 사례가 늘고 있다."}]},
      {tag:"통화정책",title:"유가 100달러 돌파에 Fed 7월 금리 인상 확률 38%로 급등…1주 전 12%서 세 배",
       source:{name:"CNBC",url:"https://www.cnbc.com/2026/07/23/fed-interest-rate-odds-oil-jobless-claims.html",date:"2026.07.23"},
       f1:"시카고상품거래소(CME) 페드워치 기준 7월 28~29일 FOMC에서 연준이 기준금리를 0.25%포인트 인상할 확률이 38%로 집계됐다. 불과 1주일 전 12% 미만이었던 것과 비교하면 세 배 가까이 뛴 수치다. 케빈 워시 신임 연준 의장 취임 후 두 번째로 열리는 이번 회의에서 연준은 여전히 현 3.50~3.75% 동결을 기본 시나리오로 보고 있지만, 불확실성이 빠르게 커지고 있다.",
       f2:"인상 확률 급등의 배경은 후티의 사우디 유조선 공격으로 브렌트유가 100달러를 돌파하며 재점화된 인플레이션 우려다. 7월 내내 이어진 에너지 가격 상승이 물가 지표를 계속 밀어올릴 경우, 연준이 예정보다 앞당겨 인상에 나설 수 있다는 관측이 힘을 얻고 있다. 이 여파로 미 국채 금리도 함께 올랐다.",
       f3:"1주일 만에 인상 확률이 세 배로 뛴 것은 시장이 지정학 변수 하나에 이렇게까지 민감하게 반응한다는 뜻이다. 매크로 시나리오를 다루는 컨설턴트라면, 이런 국면에서는 '가장 가능성이 큰 시나리오' 하나만 준비하기보다, 유가가 얼마나 더 오르면 연준의 셈법이 바뀌는지 임계점(threshold)을 명시적으로 잡아두는 방식이 훨씬 유용하다는 점을 기억해야 한다.",
       terms:[{t:"CME 페드워치(FedWatch)",d:"시카고상품거래소가 연방기금금리 선물 가격을 바탕으로 산출하는 연준의 금리 결정 확률 지표. 시장이 다음 FOMC 회의 결과를 어떻게 예상하는지 실시간으로 보여준다."}]}
    ]},
    {id:"tech",no:"03",title:"테크·AI",slug:"Tech·AI",items:[
      {tag:"AI인프라",title:"美 빅테크 5곳 'AI 숨은 부채' 1조6500억달러…재무제표 부채보다 22% 많아",
       source:{name:"Nikkei Asia",url:"https://asia.nikkei.com/business/technology/five-us-tech-giants-hidden-debts-soar-to-1.65tn-on-opaque-ai-funding",date:"2026.07"},
       f1:"닛케이아시아 분석에 따르면 알파벳·마이크로소프트·아마존·메타·오라클 등 미국 빅테크 5곳의 '숨은 부채(오프발란스시트 부채)'가 약 4년 만에 8배로 불어나 1조6500억달러에 달하는 것으로 나타났다. 이는 5개사가 최근 분기 재무제표에 공식 반영한 부채 1조3500억달러보다 22%(약 3000억달러) 많은 규모다.",
       f2:"이 숨은 부채는 데이터센터 장기 임대 계약과 GPU 장기 공급 계약에서 비롯된다. 수요와 무관하게 매년 정해진 금액을 지급해야 한다는 점에서 사실상 '빚'과 같지만, 회계상 대차대조표의 부채 항목에는 잡히지 않는다. 메타의 오프발란스시트 부채는 약 4200억달러, 오라클은 2733억달러로 2022년 대비 무려 2900% 급증했다.",
       f3:"'실적은 사상 최대인데 재무 건전성은 눈에 잘 안 보이는 곳에서 악화되는' 구조는 AI 투자 붐의 이면이다. 재무자문·리스크 자문을 지망하는 컨설턴트라면, 클라이언트의 진짜 레버리지를 파악하려면 대차대조표에 찍히는 숫자만이 아니라 장기 임대·공급 계약처럼 '부채처럼 행동하지만 부채로 잡히지 않는' 의무까지 추적하는 역량이 필요하다는 점을 이 분석에서 확인할 수 있다.",
       terms:[{t:"오프발란스시트(부외) 부채",d:"대차대조표(재무상태표)에 부채로 직접 표시되지 않지만, 장기 임대료·공급대금처럼 미래에 반드시 지급해야 하는 고정 채무. 실질적으로는 빚과 같은 효과를 내지만 공식 부채비율 계산에는 잡히지 않아 '숨은 레버리지'로 불린다."}]},
      {tag:"AI인력",title:"아마존, AGI 조직 감원…한편으론 AI 인프라에 2000억달러 쏟아붓기",
       source:{name:"CNBC",url:"https://www.cnbc.com/2026/07/22/amazon-lays-off-some-employees-in-its-agi-unit.html",date:"2026.07.22"},
       f1:"아마존이 자체 범용인공지능(AGI) 조직에서 일부 인력을 감원했다고 7월 22일 확인했다. 모델 커스터마이징·사후학습(post-training) 관련 직무가 주로 영향을 받았으며, 회사는 정확한 감원 규모를 공개하지 않았다. 감원된 미국 직원들에게는 90일치 급여·복리후생과 재취업 지원, 임시 건강보험 등이 제공된다.",
       f2:"이번 감원은 아마존이 프런티어 연구보다 기업 고객 대상 배포(deployment)에 집중하는 방향으로 AGI 조직을 재편하는 과정에서 나왔다. AGI 조직은 지난해 12월 피터 디샌티스 수석부사장 산하로 통합됐으며, 이번에는 아디브 샤나·비샬 샤르마 부사장이 이끄는 팀이 주로 축소됐다. 회사는 'AI 인프라에는 계속 2000억달러 규모를 투자하고 있다'며 감원이 투자 축소를 의미하지 않는다고 밝혔다.",
       f3:"같은 회사 안에서 '프런티어 연구 인력은 줄이고, 인프라 투자는 늘리는' 상반된 움직임이 동시에 나타나는 점이 핵심이다. HR·조직전략 자문을 지망하는 컨설턴트라면, AI 시대의 인력 재편은 '전체 축소'가 아니라 '연구에서 배포로', '모델 개발에서 인프라 운영으로' 인력의 성격 자체가 바뀌는 재배치라는 점을 이 사례에서 읽어야 한다.",
       terms:[{t:"AGI(범용인공지능)",d:"특정 과업에 국한되지 않고 인간처럼 폭넓은 영역에서 학습·추론할 수 있는 인공지능. 아마존·구글·오픈AI 등 빅테크가 별도 조직을 두고 개발 경쟁을 벌이고 있다."}]}
    ]},
    {id:"korea",no:"04",title:"한국",slug:"Korea",items:[
      {tag:"증시",title:"코스피, 알파벳發 반도체 훈풍에 나흘 만에 7000선 탈환…외국인 2조원대 순매수",
       source:{name:"한국일보",url:"https://www.hankookilbo.com/news/article/A2026072315370000561",date:"2026.07.23"},
       f1:"코스피가 7월 23일 전 거래일보다 4.4%(299.19포인트) 오른 7096.89로 마감하며 5거래일 만에 7000선을 회복했다. 코스닥도 5.2%(39.19포인트) 오른 790.28에 거래를 마쳤다. 원·달러 환율은 전 거래일보다 13.3원 내린 1466.8원에 마감했다.",
       f2:"역설적이게도 알파벳이 2분기 설비투자 가이던스를 2050억달러까지 상향한 것이 미국에서는 알파벳·테슬라 주가 폭락으로 이어졌지만, 한국에서는 정반대로 작용했다. 늘어난 AI 설비투자가 결국 삼성전자·SK하이닉스 등 메모리 반도체 수요로 이어질 것이라는 기대에 외국인이 유가증권시장에서 2조원 넘게 순매수했고, 삼성전자(+3.65%)·SK하이닉스(+4.86%)·LG에너지솔루션(+8.41%) 등이 동반 강세를 보였다. 다만 개인 투자자는 2조2000억원어치를 순매도해 여전히 신중한 태도를 유지했다.",
       f3:"같은 뉴스(빅테크 capex 확대)가 미국 시장에서는 '비용 부담'으로, 한국 시장에서는 '수요 확대'로 정반대로 해석된 사례다. 자본시장 자문을 지망하는 컨설턴트라면, 하나의 이벤트가 밸류체인의 어느 위치에 있는 기업이냐에 따라 정반대 신호로 작용할 수 있다는 점, 즉 '누구에게는 비용이 누구에게는 매출이 된다'는 원리를 구조적으로 짚어낼 수 있어야 한다.",
       terms:[]},

      {label:"6. 부가적 언급 — 리스크·제약사항", detail:"이 권고는 후티의 봉쇄가 밥엘만데브 전역으로 확대되지 않고, 미군의 대이란 공습(12일째)이 현 수준을 유지한다는 시나리오를 전제로 한다. 만약 호르무즈가 전면 봉쇄되거나 후티 공격이 격화돼 두 해협이 동시에 마비되면, 우회 항로 전환 비중을 즉시 상향 조정하고 정유 가동률 조정까지 검토해야 한다는 점을 덧붙인다."}
    ],
    hint:"<b>의사결정 기준</b> — 실제 MBB 케이스는 항상 이 기준으로 마무리한다: 정량(비용·기간) + 정성(관계·리스크) + 실현가능성 + 수익성. '유가가 올랐으니 조달처를 다변화하면 된다'는 한 줄짜리 답이 아니라, Clarification → 가설수립 → 정보파악 → 분석/추론 → 결론(두괄식) → 부가적 언급까지 6단계를 명시적으로 거치는 것 자체가 '컨설턴트처럼 생각한다'는 것을 보여주는 핵심이다."
  },
  calendar:{note:"일정은 유동적이므로 확정 전 원문 확인을 권장한다.",
    macro:[
      {date:"07.28~29",reg:"🇺🇸",ev:"FOMC",nt:"유가발 인플레이션 우려로 7월 인상 확률이 38%(1주 전 12% 미만에서 급등)까지 치솟음. 이란-후티發 유가 충격이 통화정책까지 흔드는지 주목."},
      {date:"07.29~30",reg:"🇭🇰",ev:"중지이노라이트 홍콩 IPO 공모가 확정·상장",nt:"최대 81억달러 규모, 2019년 알리바바 이후 최대 홍콩 IPO 될 가능성."},
      {date:"07.31",reg:"🇯🇵",ev:"키옥시아(Kioxia) 실적 발표",nt:"Viasat 특허소송 2억2900만달러 배상 판결 이후 첫 실적, AI發 메모리 수요 훈풍이 얼마나 반영될지 주목."},
      {date:"08.01(잠정)",reg:"🇺🇸",ev:"美 생성의약품 관세 유예 종료 카운트다운 개시",nt:"2028년 8월부터 100%, 2029년 200% 관세 예고. 일본은 15% 상한 협상 완료 상태."},
      {date:"08.11",reg:"🎓",ev:"맥킨지 2027 서머 애널리스트 지원 마감",nt:"7월 1일 지원 시작. 베인 어소시에이트컨설턴트는 이미 7월 19일 마감."},
      {date:"09월(잠정)",reg:"🌐",ev:"OpenAI IPO(잠정)",nt:"골드만삭스·모건스탠리 주관, 목표 밸류 최대 8500억달러."}
    ],
    earnings:[],
    sources:[{name:"CNBC",url:"https://www.cnbc.com/2026/07/23/iran-war-us-trump-houthis-red-sea-oil.html"},{name:"한국일보",url:"https://www.hankookilbo.com/news/article/A2026072315370000561"}]
  }
};
const $ = (s,el=document)=>el.querySelector(s);
const esc = s => (s==null?"":String(s));
const nowKST = new Date().toLocaleTimeString('en-GB',{timeZone:'Asia/Seoul',hour:'2-digit',minute:'2-digit'});
$("#meta").innerHTML = `<b><a href="archive.html" style="text-decoration:underline;text-decoration-color:var(--accent-soft)" title="지난 브리핑 모아보기">${esc(BRIEFING.dateLabel)}</a></b><span>·</span><span>${esc(BRIEFING.city||'Seoul')} · ${nowKST} KST 열람</span>`;
$("#mood").textContent = BRIEFING.mood || "";
$("#heads").innerHTML = BRIEFING.headliners.map(h=>`<li>${esc(h)}</li>`).join("");
const cu = BRIEFING.catchup;
if(cu){ $("#catchup").innerHTML = `<span class="ck">🕰️ 오늘의 따라잡기 — 처음부터 이해하기</span><h3>${esc(cu.topic)}</h3><p class="intro">${esc(cu.intro)}</p><ul class="tl">${(cu.timeline||[]).map(t=>`<li><span class="d">${esc(t.d)}</span>${esc(t.e)}</li>`).join("")}</ul><div class="why">${cu.why||""}</div>`; } else { $("#catchup").style.display="none"; }
const navItems = [...BRIEFING.sections.map(s=>({id:s.id,no:s.no,title:s.title})), {id:"think",no:"💭",title:"생각거리"},{id:"cal",no:"📅",title:"일정"}];
$("#nav").innerHTML = navItems.map(n=> `<a href="#${n.id}" data-id="${n.id}"><span class="n">${esc(n.no)}</span>${esc(n.title)}</a>`).join("");
function srcHtml(s){ if(!s) return ""; const link = s.url ? ` · <a href="${esc(s.url)}" target="_blank" rel="noopener">원문(${esc(s.date)})↗</a>` : (s.date?` · ${esc(s.date)}`:""); return `<span class="item__src">${esc(s.name)}${link}</span>`; }
function fieldRow(lab,val,cls){return val?`<div class="field ${cls||""}"><span class="lab">${lab}</span><span class="val">${val}</span></div>`:""}
function termsRow(terms){ if(!terms||!terms.length) return ""; return `<div class="terms"><div class="th">📖 용어 풀이</div>${terms.map(t=>`<div class="t"><b>${esc(t.t)}</b> — ${esc(t.d)}</div>`).join("")}</div>`; }
function vocabRow(v){ if(!v) return ""; return `<div class="jword"><span class="jw-badge">🇯🇵 오늘의 비즈니스 일본어</span><span class="jw-text"><b>${esc(v.w)}</b> <span class="jw-r">(${esc(v.r)})</span> — ${esc(v.m)}</span></div>`; }
function itemCard(it){ return `<article class="item open"><button class="item__head" aria-expanded="true" type="button"><span class="tag">${esc(it.tag)}</span><span><span class="item__title">${esc(it.title)}</span><br>${srcHtml(it.source)}</span><span class="chev">▾</span></button><div class="item__wrap"><div class="item__body"><div class="item__inner">${fieldRow("무슨 일",it.f1)}${fieldRow("그동안의 이야기",it.f2,"story")}${fieldRow("So What",it.f3)}${termsRow(it.terms)}${vocabRow(it.vocab)}</div></div></div></article>`; }
let html = BRIEFING.sections.map(s=>`<section class="block" id="${s.id}"><div class="shead"><span class="no">${esc(s.no)}</span><h2>${esc(s.title)}</h2><span class="slug">${esc(s.slug)}</span></div>${s.items.map(itemCard).join("")}</section>`).join("");
if(BRIEFING.think){ const th=BRIEFING.think; const stepsHtml=(th.steps||[]).map(s=>`<li><b>${esc(s.label)}</b> — ${esc(s.detail)}</li>`).join(""); html += `<section class="block" id="think"><div class="think"><span class="tk">💭 오늘의 생각거리 — 컨설턴트처럼 생각하기</span><p>${esc(th.q)}</p><ol class="steps">${stepsHtml}</ol><div class="hint">${th.hint||""}</div></div></section>`; }
const c = BRIEFING.calendar || {macro:[],earnings:[],sources:[]};
html += `<section class="block" id="cal"><div class="shead"><span class="no">📅</span><h2>다가오는 일정</h2><span class="slug">watchlist</span></div><div class="terms" style="border-style:solid">${[...(c.macro||[]),...(c.earnings||[])].map(r=>`<div class="t"><b>${esc(r.date)} ${esc(r.reg||"")} ${esc(r.ev)}</b>${r.nt?` — ${esc(r.nt)}`:""}</div>`).join("")}<div class="th" style="margin-top:8px">${esc(c.note||"")}</div></div></section>`;
$("#main").innerHTML = html;
const calSrc = (c.sources||[]).map(s=>`<a href="${esc(s.url)}" target="_blank" rel="noopener">${esc(s.name)} ↗</a>`).join(" · ");
$("#main").insertAdjacentHTML("beforeend",`<footer>소스 정책: Bloomberg · CNBC · BBC · ABC · Reuters · AP + 한국 주요 언론 + 일본 니케이·Japan Times 등 + 컨설팅업계 전문 매체 — 작성 시점 검색·교차 확인 기준.<br>전황·시세는 빠르게 변하므로 중요한 판단 전 원문 확인 권장 · 일정 출처: ${calSrc}<br>💡 매일 아침 9:30 KST에 이 페이지가 자동으로 새 브리핑으로 갱신됩니다. · 📚 <a href="archive.html">지난 브리핑 모아보기</a></footer>`);
document.querySelectorAll(".item__head").forEach(h=>{ h.addEventListener("click",()=>{ const it=h.closest(".item"); const open=it.classList.toggle("open"); h.setAttribute("aria-expanded",open?"true":"false"); }); });
const allBtn=$("#toggleAll"), allLab=$("#toggleAllLabel");
allBtn.addEventListener("click",()=>{ const items=[...document.querySelectorAll(".item")]; const anyClosed=items.some(i=>!i.classList.contains("open")); items.forEach(i=>{i.classList.toggle("open",anyClosed); i.querySelector(".item__head").setAttribute("aria-expanded",anyClosed?"true":"false");}); allLab.textContent=anyClosed?"접기":"펼치기"; });
const root=document.documentElement;
$("#theme").addEventListener("click",()=>{root.setAttribute("data-theme", root.getAttribute("data-theme")==="dark"?"light":"dark");});
$("#print").addEventListener("click",()=>window.print());
const links=[...document.querySelectorAll(".navlinks a")];
const spy=new IntersectionObserver(ents=>{ ents.forEach(e=>{if(e.isIntersecting){links.forEach(l=>l.classList.toggle("active",l.dataset.id===e.target.id));}}); },{rootMargin:"-45% 0px -50% 0px"});
document.querySelectorAll("section.block").forEach(s=>spy.observe(s));
</script>
</body>
</html>
