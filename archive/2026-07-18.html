       source:{name:"ABC News",url:"https://abc7news.com/post/latest-iran-war-news-today-us-strikes-bridges-trump-threatens-infrastructure-kuwait-water-desalination-plant-targeted/19526698/",date:"2026.07.17"},
       f1:"미군은 7월 17일로 이어진 7일째 밤에도 이란 남부 호르모즈간주 반다르 하미르의 교량 2곳을 정밀 타격해 최소 8명이 숨졌다. 이 공습은 이란의 주요 원유 수출항인 반다르아바스와 수도 테헤란을 잇는 육로를 끊어내려는 목적으로 알려졌다. 이란 당국은 최근 이어진 미군 공습으로 최소 46명이 숨지고 400명 넘게 다쳤다고 밝혔다.",
       f2:"이에 맞서 이란 혁명수비대는 같은 날 요르단·쿠웨이트·바레인·카타르·오만·시리아 등 6개국에 걸친 미군 기지와 인프라를 동시다발로 타격했다. 쿠웨이트에서는 알아다이리 탄약고와 알리 알살렘 공군기지가, 바레인에서는 사키르 공군기지가, 카타르에서는 알우데이드 공군기지가, 시리아에서는 알탄프 특수작전기지가 각각 표적이 됐다. 이란은 이번 보복을 '눈에는 눈' 작전이라 칭했다.",
       f3:"전선이 호르무즈 해협을 넘어 걸프 6개국으로 동시에 확대되는 양상은, 지정학 리스크를 다루는 컨설턴트에게 '리스크가 한 지점에 머무르지 않고 여러 국가·인프라로 동시다발 전이될 수 있다'는 시나리오 플래닝의 필요성을 보여준다. 에너지·항공·물류 클라이언트라면 특정 국가 하나가 아니라 역내 전체 공급망 지도를 그려놓고 리스크를 모니터링해야 한다.",
       terms:[{t:"IRGC(혁명수비대)",d:"이란 정규군과 별도로 존재하는 이란의 정예 군사조직으로, 이번 걸프 보복 공습을 주도하고 있다."}]},
      {tag:"인프라·안보",title:"이란, 쿠웨이트 담수화·발전 복합단지 타격…걸프 '물 안보' 취약성 노출",
       source:{name:"Bloomberg",url:"https://www.bloomberg.com/news/articles/2026-07-17/iran-attacks-kuwait-desalination-and-power-plants-as-hostilities-worsen",date:"2026.07.17"},
       f1:"이란 혁명수비대는 7월 17일 쿠웨이트 알아흐마디주에 위치한 슈아이바 발전·담수화 복합단지를 공격해 발전설비 여러 곳이 파손되고 화재가 발생했다.",
       f2:"쿠웨이트는 식수의 약 90%를 해수담수화에 의존하는 나라다. 이번 공격 전까지 양측 공방은 주로 군사기지·유조선·원유 인프라에 집중돼 있었으나, 처음으로 민간 필수 인프라인 상수도 시설이 직접 피해를 입으며 확전 양상이 새로운 국면에 접어들었다.",
       f3:"에너지 다음으로 '물'이 분쟁의 다음 타깃이 될 수 있다는 신호다. 인프라 투자·보험 클라이언트를 자문하는 컨설턴트라면, 분쟁 지역에서는 에너지 인프라뿐 아니라 담수화·전력망 같은 생명유지 인프라의 이중 사용(민간+군사) 리스크까지 스트레스 테스트에 포함해야 한다는 점을 새겨야 한다.",
       terms:[{t:"담수화(desalination)",d:"해수에서 염분을 제거해 식수·공업용수로 만드는 공정. 걸프 산유국 대부분이 강수량이 적어 식수를 담수화 설비에 의존한다."}]}
    ]},
    {id:"econ",no:"02",title:"글로벌 경제·시장",slug:"Economy",items:[
      {tag:"반도체투자심리",title:"필라델피아반도체지수 6월 고점 대비 20%↓ '약세장' 진입…6/22 이후 시총 3.3조달러 증발",
       source:{name:"Bloomberg",url:"https://www.bloomberg.com/news/articles/2026-07-17/ai-upheaval-crushes-retail-traders-crowding-into-leveraged-funds",date:"2026.07.17"},
       f1:"필라델피아반도체지수(SOX)는 7월 17일 장중 한때 5.7% 추가 하락하며, 6월 말 사상 최고치 대비 20% 넘게 떨어져 기술적 약세장에 진입했다. 6월 22일 이후 전 세계 반도체 관련주에서 증발한 시가총액은 약 3조3000억달러에 달한다.",
       f2:"직접적 계기는 중국 스타트업 문샷AI가 공개한 초거대 오픈웨이트 모델 '킴 K3'다. 시장은 이를 지난해 딥시크 쇼크의 재연으로 받아들이며 미국 반도체 기업들의 밸류에이션을 재점검하기 시작했다. 여기에 레버리지 ETF의 기계적 매도까지 겹쳤다 — 레버리지 ETF 전체 운용자산은 사상 최고치인 2180억달러에서 1980억달러로 줄었는데, 이런 상품은 주가가 오르면 더 사고 내리면 더 파는 구조라 하락을 증폭시킨다.",
       f3:"아직 검증되지 않은 벤치마크 주장(킴 K3 가중치는 7월 27일에야 공개 예정) 하나가 3조달러 넘는 시가총액을 흔든다는 사실은, 자본시장에서는 '사실'보다 '사실에 대한 기대'가 먼저 가격에 반영된다는 원칙을 보여준다. 반도체·AI 인프라 클라이언트를 다룬다면, 펀더멘털 변화와 레버리지發 기술적 수급 요인을 분리해서 설명할 수 있어야 한다.",
       terms:[{t:"레버리지 ETF",d:"기초지수 일간 수익률의 2~3배를 추종하도록 설계된 상장지수펀드. 매일 리밸런싱을 하기 때문에 급등락장에서 기계적 매매가 변동성을 더 키우는 특징이 있다."}]},
      {tag:"OTT실적",title:"넷플릭스, 3분기 매출 가이던스 시장 기대 하회…시간외 8% 급락, 시총 350억달러 증발",
       source:{name:"CNBC",url:"https://www.cnbc.com/2026/07/16/netflix-nflx-earnings-q2-2026.html",date:"2026.07.16"},
       f1:"넷플릭스는 7월 16일 발표한 2분기 실적에서 매출 125억6000만달러(전년比 13%↑)를 기록해 시장 예상치를 소폭 밑돌았다. 3분기 매출 전망도 128억6000만달러로 시장 예상치(130억달러)에 못 미쳤고, 주당순이익 전망(82센트) 역시 예상치(84센트)를 하회했다.",
       f2:"실적 발표 후 시간외 거래에서 주가는 8% 가까이 급락해 시가총액 약 350억달러가 증발했다. 넷플릭스는 연간 매출 가이던스를 510억~514억달러로 좁혀 잡았고, 2027년 1월부터는 연 2회 공개하던 시청시간 리포트를 연 1회로 줄여 '핵심 재무지표(매출·영업이익)에 집중하겠다'고 밝혔다.",
       f3:"실적 자체는 성장세(+13%)를 유지했음에도 '가이던스가 기대에 못 미쳤다'는 이유만으로 시총 350억달러가 날아간 것은, 시장이 현재 실적보다 미래 가이던스의 방향성에 훨씬 더 민감하게 반응한다는 점을 보여준다. 미디어·소비재 클라이언트의 IR 전략을 자문할 때는 '숫자를 얼마나 잘 냈는가'만큼 '가이던스를 어떻게 제시하는가'가 주가 방어에 결정적이라는 점을 기억해야 한다.",
       terms:[]}
    ]},
    {id:"tech",no:"03",title:"테크·AI",slug:"Tech·AI",items:[
      {tag:"AI모델",title:"中 문샷AI, 2.8조 파라미터 'Kimi K3' 공개…美 최상위 모델과 격차 좁혀",
       source:{name:"Bloomberg",url:"https://www.bloomberg.com/news/articles/2026-07-17/china-s-powerful-new-moonshot-ai-model-closes-gap-with-us-rivals",date:"2026.07.17"},
       f1:"중국 스타트업 문샷AI는 7월 17일 오픈웨이트 모델로는 역대 최대 규모인 2.8조 파라미터급 '킴 K3'를 공개했다. 초기 벤치마크에서 코딩·범용 언어 과제 성능이 미국 최상위 모델인 앤스로픽 '클로드 페이블5', 오픈AI 'GPT-5.6'에 근접하거나 일부 앞선다는 평가가 나왔다.",
       f2:"모델 가중치 전체 공개는 7월 27일로 예정돼 있어, 현재 나온 성능 주장이 실제로 검증된 것은 아니다. 그럼에도 시장은 즉각 반응해 2025년 딥시크 쇼크 때와 마찬가지로 미국 반도체·AI 관련주가 일제히 흔들렸다.",
       f3:"검증되지 않은 벤치마크 발표만으로도 시장 전체가 출렁이는 것은, AI 산업에서는 '기술적 사실'과 '시장이 믿는 이야기'가 분리돼 움직일 수 있음을 보여준다. 컨설턴트 지망생이라면 클라이언트에게 성급한 결론 대신 '검증 시점까지 무엇을 근거로 판단을 유보할 것인가'를 구조화해 제시하는 능력이 중요하다.",
       terms:[{t:"오픈웨이트(open-weight)",d:"모델의 학습된 가중치(파라미터)를 외부에 공개해 누구나 내려받아 자체 서버에서 구동할 수 있게 한 AI 모델 공개 방식. 소스코드까지 전부 공개하는 '오픈소스'보다는 좁은 개념이다."}]},
      {tag:"지식재산권",title:"애플, 오픈AI 상대로 영업비밀 침해 소송…前 애플 직원 400명 이상 오픈AI行",
       source:{name:"CNBC",url:"https://www.cnbc.com/2026/07/10/apple-openai-lawsuit-trade-secrets.html",date:"2026.07.10"},
       f1:"애플은 7월 10일 캘리포니아 북부연방법원에 오픈AI를 상대로 영업비밀 침해 소송을 제기했다. 애플은 오픈AI가 자체 하드웨어 기기 개발 과정에서 애플의 기밀정보를 조직적으로 탈취했다고 주장했다.",
       f2:"소장에 따르면 애플 출신인 오픈AI 하드웨어총괄 탕 탄이 면접 과정에서 지원자들에게 애플 부품 실물을 가져오도록 요구했고, 애플 출신 엔지니어 창 리우는 오픈AI 이직 후에도 애플 내부 파일을 다운로드했다는 의혹이 제기됐다. 소장에는 현재 오픈AI에 재직 중인 전직 애플 직원이 400명을 넘는다는 내용도 담겼다. 애플과 오픈AI는 2024년 챗GPT를 아이폰 운영체제에 탑재하는 파트너십을 맺은 바 있어 이번 소송은 관계의 급반전으로 받아들여진다.",
       f3:"파트너십을 맺었던 두 회사가 하드웨어 사업에서는 정면으로 충돌하는 이번 사례는, AI 시대 빅테크 간 협력과 경쟁이 동시에 진행되는 '코피티션' 구조를 잘 보여준다. 빅테크 클라이언트를 자문한다면 파트너십 계약에서 인력 이동·기밀정보 보호 조항을 얼마나 촘촘히 설계했는지가 향후 소송 리스크를 좌우한다는 점을 짚어야 한다.",
       terms:[{t:"코피티션(coopetition)",d:"협력(cooperation)과 경쟁(competition)의 합성어로, 같은 산업 내 기업들이 특정 영역에서는 협력하면서 다른 영역에서는 치열하게 경쟁하는 관계를 뜻한다."}]}
    ]},
    {id:"korea",no:"04",title:"한국",slug:"Korea",items:[
      {tag:"통화정책",title:"신현송 한은 총재 \"인상 기조 지속\"…8월 연속 인상 여부는 \"모든 가능성 열어둬\"",
       source:{name:"한국일보",url:"https://www.hankookilbo.com/news/article/A2026071712080003402",date:"2026.07.17"},
       f1:"신현송 한국은행 총재는 7월 17일, 기준금리를 2.75%로 올린 다음날 인터뷰에서 '물가상승률이 목표 수준(2%)까지 안정적으로 수렴한다는 확신이 들 때까지 대응하겠다'며 추가 인상 기조를 재확인했다. 8월 연속 인상 여부에 대해서는 '모든 가능성을 열어두겠다'고 말했다.",
       f2:"시장 전망은 엇갈린다. 한국투자증권과 하나증권은 다음 인상 시점을 기존 10월에서 8월로 앞당겨 잡았고, 씨티은행도 2분기 GDP가 호조를 보이고 수요측 물가 압력이 계속되면 8월 금통위에서 추가 인상 가능성이 있다고 전망했다. 반면 메리츠증권은 7월 물가가 안정되는 흐름이 확인되면 8월엔 동결할 가능성이 크다고 봤다.",
       f3:"중앙은행 총재가 다음 결정을 '모든 가능성 열어두기'로 표현하는 것은 데이터에 따라 언제든 방향을 바꿀 수 있다는 신호다. 금융기관·거시경제 자문을 지망하는 컨설턴트라면, 이런 '옵션성 있는 표현' 자체를 하나의 정보로 읽고, 다음 결정에 영향을 줄 핵심 변수(이번 경우 2분기 GDP·7월 물가)를 먼저 짚어내는 훈련이 필요하다.",
       terms:[{t:"통화정책방향 결정회의(금통위)",d:"한국은행 금융통화위원회가 기준금리 등 통화정책을 결정하는 회의로, 연 8회 정기적으로 열린다."}]},
      {tag:"성장전망",title:"한은 \"핵심 변수는 반도체 가격\"…호황이 성장 떠받치지만 물가엔 부담",
       source:{name:"한국경제",url:"https://www.hankyung.com/article/2026071602611",date:"2026.07.16"},
       f1:"한국은행은 7월 16일 통화정책방향 자료에서 올해 국내 경제 성장률이 반도체 경기 호조와 그 파급효과에 힘입어 확대될 전망이라면서도, 물가상승률은 반도체발 수요압력 확대로 높은 수준을 지속할 것이라 진단했다.",

      {label:"6. 부가적 언급 — 리스크·제약사항", detail:"이 권고는 킴 K3의 실제 학습·추론 비용 절감 효과가 아직 검증되지 않았다는 전제에 기반한다. 만약 7월 27일 공개된 가중치가 벤치마크 주장을 실제로 입증하고 GPU·HBM 수요 자체를 구조적으로 낮추는 것으로 판명되면, 이는 감성적 조정이 아니라 펀더멘털 변화이므로 CapEx·투자자 메시지 전략을 즉시 재검토해야 한다는 점을 덧붙인다."}

    hint:"<b>의사결정 기준</b> — 실제 MBB 케이스는 항상 이 기준으로 마무리한다: 정량(비용·기간) + 정성(관계·리스크) + 실현가능성 + 수익성. '경쟁 모델이 나왔으니 우리도 대응하면 된다'는 한 줄짜리 답이 아니라, Clarification → 가설수립 → 정보파악 → 분석/추론 → 결론(두괄식) → 부가적 언급까지 6단계를 명시적으로 거치는 것 자체가 '컨설턴트처럼 생각한다'는 것을 보여주는 핵심이다."
  },
  calendar:{note:"일정은 유동적이므로 확정 전 원문 확인을 권장한다.",
    macro:[
      {date:"07.23(목)",reg:"🇰🇷",ev:"부동산 정책 대토론회 (이재명 대통령 주재)",nt:"종부세 공정시장가액비율(60%→80% 유력), 양도세 실거주 중심 개편 발표 여부 주목."},
      {date:"07.27(월)",reg:"🌐",ev:"문샷AI '킴 K3' 모델 가중치 전체 공개",nt:"벤치마크 주장의 실제 검증 시점 — 결과에 따라 반도체·AI주 반등 또는 추가 조정 갈릴 것."},
      {date:"07.28~29",reg:"🇺🇸",ev:"FOMC",nt:"케빈 워시 의장의 매파 기조가 실제 결정에 반영될지, 한국은행과의 금리차 추가 확대 여부도 관건."},
      {date:"08월(잠정)",reg:"🇰🇷",ev:"한국은행 8월 금통위, 연속 기준금리 인상 여부",nt:"2분기 GDP·7월 물가 지표가 핵심 변수로 지목됨."},
      {date:"08월(잠정)",reg:"🌍",ev:"이란-미국 확전, IEA가 제시한 '수 주' 시한 도래",nt:"걸프 6개국으로 번진 전선이 봉합되지 않으면 세계 경제 성장률 하향 조정 가능성."}
    ],
    earnings:[],
    sources:[{name:"Bloomberg",url:"https://www.bloomberg.com/news/articles/2026-07-17/ai-upheaval-crushes-retail-traders-crowding-into-leveraged-funds"},{name:"한국일보",url:"https://www.hankookilbo.com/news/article/A2026071712080003402"}]
  }
};
const $ = (s,el=document)=>el.querySelector(s);
const esc = s => (s==null?"":String(s));
const nowKST = new Date().toLocaleTimeString('en-GB',{timeZone:'Asia/Seoul',hour:'2-digit',minute:'2-digit'});
$("#meta").innerHTML = `<b><a href="archive.html" style="text-decoration:underline;text-decoration-color:var(--accent-soft)" title="지난 브리핑 모아보기">${esc(BRIEFING.dateLabel)}</a></b><span>·</span><span>${esc(BRIEFING.city||'Seoul')} · ${nowKST} KST 열람</span>`;
$("#mood").textContent = BRIEFING.mood || "";
$("#heads").innerHTML = BRIEFING.headliners.map(h=>`<li>${esc(h)}</li>`).join("");
const cu = BRIEFING.catchup;
if(cu){ $("#catchup").innerHTML = `<span class="ck">🕰️ 오늘의 따라잡기 — 처음부터 이해하기</span><h3>${esc(cu.topic)}</h3><p class="intro">${esc(cu.intro)}</p><ul class="tl">${(cu.timeline||[]).map(t=>`<li><span class="d">${esc(t.d)}</span>${esc(t.e)}</li>`).join("")}</ul><div class="why">${cu.why||""}</div>`; } else { $("#catchup").style.display="none"; }
const navItems = [...BRIEFING.sections.map(s=>({id:s.id,no:s.no,title:s.title})), {id:"think",no:"💭",title:"생각거리"},{id:"cal",no:"📅",title:"일정"}];
$("#nav").innerHTML = navItems.map(n=> `<a href="#${n.id}" data-id="${n.id}"><span class="n">${esc(n.no)}</span>${esc(n.title)}</a>`).join("");
function srcHtml(s){ if(!s) return ""; const link = s.url ? ` · <a href="${esc(s.url)}" target="_blank" rel="noopener">원문(${esc(s.date)})↗</a>` : (s.date?` · ${esc(s.date)}`:""); return `<span class="item__src">${esc(s.name)}${link}</span>`; }
function fieldRow(lab,val,cls){return val?`<div class="field ${cls||""}"><span class="lab">${lab}</span><span class="val">${val}</span></div>`:""}
function termsRow(terms){ if(!terms||!terms.length) return ""; return `<div class="terms"><div class="th">📖 용어 풀이</div>${terms.map(t=>`<div class="t"><b>${esc(t.t)}</b> — ${esc(t.d)}</div>`).join("")}</div>`; }
function vocabRow(v){ if(!v) return ""; return `<div class="jword"><span class="jw-badge">🇯🇵 오늘의 비즈니스 일본어</span><span class="jw-text"><b>${esc(v.w)}</b> <span class="jw-r">(${esc(v.r)})</span> — ${esc(v.m)}</span></div>`; }
function itemCard(it){ return `<article class="item open"><button class="item__head" aria-expanded="true" type="button"><span class="tag">${esc(it.tag)}</span><span><span class="item__title">${esc(it.title)}</span><br>${srcHtml(it.source)}</span><span class="chev">▾</span></button><div class="item__wrap"><div class="item__body"><div class="item__inner">${fieldRow("무슨 일",it.f1)}${fieldRow("그동안의 이야기",it.f2,"story")}${fieldRow("So What",it.f3)}${termsRow(it.terms)}${vocabRow(it.vocab)}</div></div></div></article>`; }
let html = BRIEFING.sections.map(s=>`<section class="block" id="${s.id}"><div class="shead"><span class="no">${esc(s.no)}</span><h2>${esc(s.title)}</h2><span class="slug">${esc(s.slug)}</span></div>${s.items.map(itemCard).join("")}</section>`).join("");
if(BRIEFING.think){ const th=BRIEFING.think; const stepsHtml=(th.steps||[]).map(s=>`<li><b>${esc(s.label)}</b> — ${esc(s.detail)}</li>`).join(""); html += `<section class="block" id="think"><div class="think"><span class="tk">💭 오늘의 생각거리 — 컨설턴트처럼 생각하기</span><p>${esc(th.q)}</p><ol class="steps">${stepsHtml}</ol><div class="hint">${th.hint||""}</div></div></section>`; }
const c = BRIEFING.calendar || {macro:[],earnings:[],sources:[]};
html += `<section class="block" id="cal"><div class="shead"><span class="no">📅</span><h2>다가오는 일정</h2><span class="slug">watchlist</span></div><div class="terms" style="border-style:solid">${[...(c.macro||[]),...(c.earnings||[])].map(r=>`<div class="t"><b>${esc(r.date)} ${esc(r.reg||"")} ${esc(r.ev)}</b>${r.nt?` — ${esc(r.nt)}`:""}</div>`).join("")}<div class="th" style="margin-top:8px">${esc(c.note||"")}</div></div></section>`;
$("#main").innerHTML = html;
const calSrc = (c.sources||[]).map(s=>`<a href="${esc(s.url)}" target="_blank" rel="noopener">${esc(s.name)} ↗</a>`).join(" · ");
$("#main").insertAdjacentHTML("beforeend",`<footer>소스 정책: Bloomberg · CNBC · BBC · ABC · Reuters · AP + 한국 주요 언론 + 일본 니케이·Japan Times 등 + 컨설팅업계 전문 매체 — 작성 시점 검색·교차 확인 기준.<br>전황·시세는 빠르게 변하므로 중요한 판단 전 원문 확인 권장 · 일정 출처: ${calSrc}<br>💡 매일 아침 9:30 KST에 이 페이지가 자동으로 새 브리핑으로 갱신됩니다. · 📚 <a href="archive.html">지난 브리핑 모아보기</a></footer>`);
document.querySelectorAll(".item__head").forEach(h=>{ h.addEventListener("click",()=>{ const it=h.closest(".item"); const open=it.classList.toggle("open"); h.setAttribute("aria-expanded",open?"true":"false"); }); });
const allBtn=$("#toggleAll"), allLab=$("#toggleAllLabel");
allBtn.addEventListener("click",()=>{ const items=[...document.querySelectorAll(".item")]; const anyClosed=items.some(i=>!i.classList.contains("open")); items.forEach(i=>{i.classList.toggle("open",anyClosed); i.querySelector(".item__head").setAttribute("aria-expanded",anyClosed?"true":"false");}); allLab.textContent=anyClosed?"접기":"펼치기"; });
const root=document.documentElement;
$("#theme").addEventListener("click",()=>{root.setAttribute("data-theme", root.getAttribute("data-theme")==="dark"?"light":"dark");});
$("#print").addEventListener("click",()=>window.print());
const links=[...document.querySelectorAll(".navlinks a")];
const spy=new IntersectionObserver(ents=>{ ents.forEach(e=>{if(e.isIntersecting){links.forEach(l=>l.classList.toggle("active",l.dataset.id===e.target.id));}}); },{rootMargin:"-45% 0px -50% 0px"});
document.querySelectorAll("section.block").forEach(s=>spy.observe(s));
</script>
</body>
</html>
