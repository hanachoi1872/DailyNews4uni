       f1:"콩고민주공화국 보건부가 7월 15일(현지시간) 발표한 자료에 따르면, 지난 5월 15일 최초 발병 이후 확진자가 2011명, 사망자가 754명으로 늘었다. 이는 대응 개시 40일 만에 확진자 1000명을 넘어선 역대 최고 속도의 확산이다.",
       f2:"이번 유행은 승인된 백신·치료제가 없는 희귀 변종인 분디부교 바이러스가 원인이다. 세계보건기구(WHO)는 5월 17일 이를 국제적 공중보건 비상사태(PHEIC)로 선포했으며, 접촉자 추적률은 67%에 그쳐 확산 통제에 어려움을 겪고 있다. 7월 2일부터는 단클론항체 치료제 MBP134와 항바이러스제 렘데시비르에 대한 임상시험도 시작됐다.",
       f3:"백신이 없는 신종 변종 앞에서는 대응 속도가 곧 생명을 좌우한다. 헬스케어·공공보건 자문을 지망하는 컨설턴트라면, '접촉자 추적률'과 같은 선행지표가 실제 확산 곡선보다 먼저 위험 신호를 보낸다는 점, 국제기구·정부·제약사 간 신속한 자원 조정 체계 설계가 왜 중요한지를 눈여겨봐야 한다.",
       terms:[{t:"PHEIC",d:"Public Health Emergency of International Concern. WHO가 선포하는 최고 수준의 보건 경보로, 국제적 공조 대응이 필요한 감염병 사태에 적용된다."}]}
    ]},
    {id:"econ",no:"02",title:"글로벌 경제·시장",slug:"Economy",items:[
      {tag:"글로벌리스크",title:"IEA 총재 \"몇 주 내 못 풀면 세계 경제 위태\"…호르무즈발 경고 확산",
       source:{name:"Bloomberg",url:"https://www.bloomberg.com/news/articles/2026-07-16/iea-boss-warns-global-economy-in-peril-if-hormuz-crisis-persists",date:"2026.07.16"},
       f1:"국제에너지기구(IEA)의 파티 비롤 총재는 7월 16일 블룸버그와의 인터뷰에서 호르무즈 해협을 둘러싼 충돌이 '몇 주' 안에 해결되지 않으면 세계 경제가 타격을 받을 것이라고 경고했다. 그는 해협이 '완전히, 무조건적으로' 개방돼야 한다고 강조했다.",
       f2:"호르무즈 해협은 원유뿐 아니라 비료·천연가스 등 다양한 화물의 핵심 물류 통로다. 비롤 총재는 해협이 장기간 폐쇄될 경우 방글라데시·파키스탄·인도 등 에너지 수입 의존도가 높은 아시아 개발도상국이 가장 먼저, 가장 크게 타격받을 것이라고 지적했다.",
       f3:"지정학 리스크가 선진국보다 개발도상국에 비대칭적으로 더 큰 충격을 준다는 점은 공급망·원자재 클라이언트를 다루는 케이스에서 반복적으로 등장하는 구조다. 컨설턴트 지망생이라면 '누가 이 리스크에 가장 취약한가'를 먼저 구조화하는 습관을 들여야 한다.",
       terms:[{t:"IEA",d:"국제에너지기구(International Energy Agency). 주요 선진국이 회원으로 참여하는 에너지 정책 국제기구로, 원유 등 에너지 시장 동향을 모니터링하고 정책 권고를 낸다."}]},
      {tag:"소비지표",title:"美 6월 소매판매 0.2% 증가에 그쳐…세금 환급 효과 소진",
       source:{name:"Bloomberg",url:"https://www.bloomberg.com/news/articles/2026-07-16/us-retail-sales-rise-modestly-as-consumers-spend-less-on-gas",date:"2026.07.16"},
       f1:"미 상무부는 7월 16일 6월 소매판매가 전월 대비 0.2% 증가했다고 발표했다. 시장 예상치(0.3%)를 밑도는 수치로, 전월 1%(수정치) 증가에서 크게 둔화됐다. 주유소 매출은 휘발유값 하락으로 5.3% 급감했지만, 이를 제외하면 소매판매는 0.7% 늘었다.",
       f2:"월드컵 특수와 아마존 프라임데이가 온라인 소매(1.9%↑)·자동차 판매(1.9%↑) 증가를 이끌었지만, 상반기 내내 소비를 떠받쳐온 세금 환급 효과가 소진되며 전반적인 모멘텀은 약화되는 모습이다.",
       f3:"호르무즈발 유가 상승이 역설적으로 주유소 매출을 통계상 끌어내리면서 소비 둔화를 과장해 보이게 만드는 효과도 있다. 소비재·리테일 클라이언트를 자문할 때는 헤드라인 숫자 이면의 '가격 효과'와 '물량 효과'를 분리해서 읽는 능력이 중요하다.",
       terms:[]}
    ]},
    {id:"tech",no:"03",title:"테크·AI",slug:"Tech·AI",items:[
      {tag:"반도체",title:"TSMC 2분기 순이익 77% 급증 '역대 최대'…애리조나에 1000억달러 추가 투자",
       source:{name:"CNBC",url:"https://www.cnbc.com/2026/07/16/tsmc-second-quarter-profit-.html",date:"2026.07.16"},
       f1:"TSMC가 7월 16일 발표한 2분기 매출은 402억달러로 전년 대비 36% 증가했고, 순이익은 77.4% 급증해 분기 기준 사상 최대치를 기록했다. 매출총이익률은 자체 가이던스 상단을 웃도는 67.7%였다.",
       f2:"AI 가속기가 포함된 고성능컴퓨팅(HPC) 부문이 전체 매출의 66%를 차지하며 성장을 견인했다. TSMC는 올해 설비투자(CapEx) 전망을 기존 520억~560억달러에서 600억~640억달러로 상향 조정했고, C.C. 웨이 최고경영자는 애리조나 공장에 1000억달러를 추가 투자한다고 밝혀 누적 투자액이 2650억달러로 늘었다.",
       f3:"실적은 역대 최고였지만, CapEx 가이던스 상향은 시장에 'AI 인프라 투자가 언제까지 늘어나야 하느냐'는 밸류에이션 불안을 자극해 오히려 반도체株 전반의 매도로 이어졌다. 좋은 실적이 반드시 주가 상승으로 연결되지 않는다는 점, 즉 숫자 자체보다 시장이 그 숫자를 '어떻게 해석하느냐'가 더 중요할 수 있다는 것을 보여주는 사례다.",
       terms:[{t:"HPC(고성능컴퓨팅)",d:"High Performance Computing. AI 가속기·서버용 반도체가 포함되는 매출 구분으로, TSMC 실적에서 AI 수요를 가늠하는 핵심 지표로 쓰인다."}]},
      {tag:"메모리반도체",title:"중국 CXMT, 85억달러 IPO 추진…마이크론·SK하이닉스 '메모리 전쟁' 격화",
       source:{name:"Bloomberg",url:"https://www.bloomberg.com/news/features/2026-07-09/china-s-cxmt-chipmaker-eyes-ipo-to-challenge-samsung-sk-hynix-micron",date:"2026.07.09"},
       f1:"중국 최대 D램 제조사 창신메모리테크놀로지(CXMT)가 최초 목표의 거의 두 배인 85억5000만달러 규모 상하이 증시 상장을 추진 중이다. CXMT의 D램 시장 점유율은 1분기 기준 약 8%로 전년 대비 3배 가까이 뛰었다. 세미애널리시스는 CXMT의 월간 웨이퍼 생산량이 연말까지 35만장에 이르러, 마이크론(약 38만5000장)에 근접할 것으로 전망했다.",
       f2:"다만 CXMT는 미국의 대중 반도체 장비 수출 규제로 최첨단 장비 확보가 막혀 있어, AI 서버에 쓰이는 고대역폭메모리(HBM) 생산에는 아직 진입하지 못하고 있다. 그럼에도 범용 D램 시장에서의 저가 공세 우려만으로 7월 15~16일 마이크론 주가가 이틀간 약 14% 급락했고, SK하이닉스·샌디스크 등도 동반 급락했다.",
       f3:"아직 실제 HBM 경쟁에 진입하지 않은 후발주자의 '상장 계획' 하나가 선두 기업들의 주가를 뒤흔들 수 있다는 점은, 반도체처럼 자본집약적인 산업에서는 실제 매출보다 '경쟁 구도의 방향성'이 밸류에이션을 먼저 움직인다는 것을 보여준다. 반도체 클라이언트를 다룬다면 범용 제품과 고부가 제품(HBM)의 경쟁 강도를 반드시 분리해서 분석해야 한다.",
       terms:[{t:"HBM",d:"High Bandwidth Memory(고대역폭메모리). 여러 개의 D램을 수직으로 쌓아 데이터 처리 속도를 높인 메모리로, AI 가속기의 핵심 부품이다. 현재 SK하이닉스·삼성전자·마이크론 세 곳만 양산 중이다."}]}
    ]},
    {id:"korea",no:"04",title:"한국",slug:"Korea",items:[
      {tag:"통화정책",title:"한은, 3년 6개월 만에 기준금리 인상…2.50%→2.75% 만장일치 결정",
       source:{name:"한국일보",url:"https://www.hankookilbo.com/news/article/A2026071608420005789",date:"2026.07.16"},
       f1:"한국은행 금융통화위원회가 7월 16일 기준금리를 연 2.50%에서 2.75%로 0.25%포인트 인상했다. 금통위원 7명 전원이 인상에 찬성한 만장일치 결정으로, 2023년 1월 이후 3년 6개월 만의 금리 인상이다.",
       f2:"수도권 집값 상승과 가계대출 증가로 자금이 부동산에 빠르게 쏠리며 금융 불균형 위험이 커진 데다, 원·달러 환율도 1400~1500원대를 넘나들며 부담으로 작용했다. 6월 소비자물가 상승률(3.2%)이 물가안정 목표(2%)를 크게 웃돈 것도 인상 배경이다. 한은은 결정문에서 '금리인상 기조를 이어 나갈 필요가 있다'고 밝혀 추가 인상 가능성을 시사했다.",
       f3:"물가·집값·환율이라는 세 변수가 동시에 임계점을 넘으면서 한은이 긴축으로 전환한 사례다. 금융기관 자문을 지망하는 컨설턴트라면, 중앙은행이 '한 가지 목표'가 아니라 여러 목표의 트레이드오프 속에서 타이밍을 결정한다는 점을 이번 결정문의 표현 하나하나에서 읽어낼 수 있어야 한다.",
       terms:[{t:"금융 불균형",d:"가계부채·자산가격이 소득·경제 기초체력 대비 과도하게 높아진 상태를 뜻하는 한국은행의 정책 용어로, 통화정책 결정에서 물가와 함께 핵심 고려 요소로 다뤄진다."}]},
      {tag:"증시",title:"코스피, 금리인상 여파에 매도 사이드카 발동…6.37% 급락 6820선",
       source:{name:"한국경제",url:"https://www.hankyung.com/article/2026071684477",date:"2026.07.16"},
       f1:"7월 16일 코스피는 전 거래일 대비 463.81포인트(6.37%) 급락한 6820.60에 마감했다. 코스닥도 37.59포인트(4.53%) 내린 791.84로 장을 마쳤다. 장중 프로그램 매도 물량이 쏟아지며 코스피·코스닥 양 시장에서 모두 매도 사이드카가 발동돼 프로그램 매매 호가 효력이 5분간 정지됐다.",
       f2:"삼성전자(-8.77%, 25만5000원)와 SK하이닉스(-11.53%, 184만2000원) 등 반도체 대형주가 낙폭을 주도했다. 전날 미국 필라델피아반도체지수가 2.08% 하락하고 마이크론이 8% 넘게 급락한 데다, 중국 CXMT 상장을 앞둔 수급 부담까지 겹치며 국내 반도체株에 매물이 집중됐다. 개인은 3조6606억원을 순매수했지만 외국인·기관이 각각 1조3920억원, 2조3682억원을 순매도하며 지수를 끌어내렸다.",
       f3:"국내 요인(금리인상)과 해외 요인(미국發 반도체 밸류에이션 우려)이 같은 날 겹치면 충격이 배가된다는 것을 보여주는 사례다. 클라이언트가 특정 업종에 집중돼 있을수록, 국내 정책 변수뿐 아니라 그 업종의 글로벌 경쟁 구도까지 함께 모니터링해야 리스크를 놓치지 않는다.",
       terms:[{t:"사이드카(매도)",d:"선물 가격이 일정 수준 이상 급락할 때 프로그램 매매 호가 효력을 5분간 정지시키는 시장 안정화 장치. 현물시장에 대한 연쇄적 매도 충격을 완화하기 위해 발동된다."}]}
    ]},
    {id:"japan",no:"05",title:"일본",slug:"Japan · MBB",items:[
      {tag:"증시",title:"日 닛케이평균 1915엔↓ 마감…메모리 관련주 총붕괴, 中 CXMT 상장 앞두고 찬물",
       source:{name:"日本経済新聞",url:"https://www.nikkei.com/article/DGXZQOFL161IHTW6A710C2000000/",date:"2026.07.16"},
       f1:"16일 도쿄 증시에서 닛케이평균주가는 3거래일 만에 반락하며 전일 대비 1915.97엔(2.79%) 내린 6만6835.54엔으로 마감했다. 장중 한때 낙폭이 2200엔을 넘어서기도 했다.",
       f2:"전날 미국 증시에서 반도체 관련주가 급락한 흐름이 도쿄 시장에도 그대로 옮겨붙었다. 중국 메모리 대기업 CXMT의 상하이 증시 상장을 앞두고 조달 자금으로 생산능력을 늘려 경쟁이 격화될 것이라는 우려가 확산되며 마이크론이 크게 밀렸고, 이 여파로 어드반테스트·도쿄일렉트론·소프트뱅크그룹·키오시아 등 4개 종목이 닛케이평균을 약 1300엔 끌어내렸다.",

function itemCard(it){ return `<article class="item open"><button class="item__head" aria-expanded="true" type="button"><span class="tag">${esc(it.tag)}</span><span><span class="item__title">${esc(it.title)}</span><br>${srcHtml(it.source)}</span><span class="chev">▾</span></button><div class="item__wrap"><div class="item__body"><div class="item__inner">${fieldRow("무슨 일",it.f1)}${fieldRow("그동안의 이야기",it.f2,"story")}${fieldRow("So What",it.f3)}${termsRow(it.terms)}${vocabRow(it.vocab)}</div></div></div></article>`; }
let html = BRIEFING.sections.map(s=>`<section class="block" id="${s.id}"><div class="shead"><span class="no">${esc(s.no)}</span><h2>${esc(s.title)}</h2><span class="slug">${esc(s.slug)}</span></div>${s.items.map(itemCard).join("")}</section>`).join("");
if(BRIEFING.think){ const th=BRIEFING.think; const stepsHtml=(th.steps||[]).map(s=>`<li><b>${esc(s.label)}</b> — ${esc(s.detail)}</li>`).join(""); html += `<section class="block" id="think"><div class="think"><span class="tk">💭 오늘의 생각거리 — 컨설턴트처럼 생각하기</span><p>${esc(th.q)}</p><ol class="steps">${stepsHtml}</ol><div class="hint">${th.hint||""}</div></div></section>`; }
const c = BRIEFING.calendar || {macro:[],earnings:[],sources:[]};
html += `<section class="block" id="cal"><div class="shead"><span class="no">📅</span><h2>다가오는 일정</h2><span class="slug">watchlist</span></div><div class="terms" style="border-style:solid">${[...(c.macro||[]),...(c.earnings||[])].map(r=>`<div class="t"><b>${esc(r.date)} ${esc(r.reg||"")} ${esc(r.ev)}</b>${r.nt?` — ${esc(r.nt)}`:""}</div>`).join("")}<div class="th" style="margin-top:8px">${esc(c.note||"")}</div></div></section>`;
$("#main").innerHTML = html;
const calSrc = (c.sources||[]).map(s=>`<a href="${esc(s.url)}" target="_blank" rel="noopener">${esc(s.name)} ↗</a>`).join(" · ");
$("#main").insertAdjacentHTML("beforeend",`<footer>소스 정책: Bloomberg · CNBC · BBC · ABC · Reuters · AP + 한국 주요 언론 + 일본 니케이·Japan Times 등 + 컨설팅업계 전문 매체 — 작성 시점 검색·교차 확인 기준.<br>전황·시세는 빠르게 변하므로 중요한 판단 전 원문 확인 권장 · 일정 출처: ${calSrc}<br>💡 매일 아침 9:30 KST에 이 페이지가 자동으로 새 브리핑으로 갱신됩니다. · 📚 <a href="archive.html">지난 브리핑 모아보기</a></footer>`);
document.querySelectorAll(".item__head").forEach(h=>{ h.addEventListener("click",()=>{ const it=h.closest(".item"); const open=it.classList.toggle("open"); h.setAttribute("aria-expanded",open?"true":"false"); }); });
const allBtn=$("#toggleAll"), allLab=$("#toggleAllLabel");
allBtn.addEventListener("click",()=>{ const items=[...document.querySelectorAll(".item")]; const anyClosed=items.some(i=>!i.classList.contains("open")); items.forEach(i=>{i.classList.toggle("open",anyClosed); i.querySelector(".item__head").setAttribute("aria-expanded",anyClosed?"true":"false");}); allLab.textContent=anyClosed?"접기":"펼치기"; });
const root=document.documentElement;
$("#theme").addEventListener("click",()=>{root.setAttribute("data-theme", root.getAttribute("data-theme")==="dark"?"light":"dark");});
$("#print").addEventListener("click",()=>window.print());
const links=[...document.querySelectorAll(".navlinks a")];
const spy=new IntersectionObserver(ents=>{ ents.forEach(e=>{if(e.isIntersecting){links.forEach(l=>l.classList.toggle("active",l.dataset.id===e.target.id));}}); },{rootMargin:"-45% 0px -50% 0px"});
document.querySelectorAll("section.block").forEach(s=>spy.observe(s));
</script>
</body>
</html>
